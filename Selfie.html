  <style data-selfie-file="true" data-name="outliner.css">

:root {
  /* System theme default: LIGHT. Dark is applied via prefers-color-scheme below.
     You can override with data-theme="dark" / data-theme="light". */

  /* Light theme: background (desktop) is darkest; edit fields are lightest. */
  --bg: #c7ccd6;
  --panel: #dde2ea;
  --panel2: #d4d9e3;
  --stroke: #aeb6c6;
  --text: #0b1220;
  --muted: #2b3550;
  --accent: #1f6feb;
  --accent-rgb: 31,111,235;

  --danger: #d1242f;
  --ok: #1a7f37;

  --field-bg: #f4f6fb; /* lightest (but not white) */
  --slot-bg: #eef2f8;
  --btn2-bg: #edf1f7;
  --toolbar-bg: rgba(199, 204, 214, .92);

  --shadow: 0 10px 28px rgba(0,0,0,.12);

  /* Slot stripe colors (theme-fitting, distinct) */
  --stripe-data: hsla(210, 85%, 45%, .35);
  --stripe-method: hsla(280, 75%, 55%, .35);
  --stripe-rw: hsla(190, 80%, 40%, .35);
  --stripe-parent: hsla(45, 90%, 45%, .35);
  --stripe-arg: hsla(140, 70%, 40%, .35);
  --stripe-literal: hsla(0, 80%, 50%, .35);
  --stripe-literalBlock: hsla(25, 90%, 45%, .35);
  --stripe-lexical: hsla(330, 80%, 50%, .35);
  --stripe-indexed: hsla(160, 80%, 35%, .35);

  --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1e1f22;
    --panel: #2b2d31;
    --panel2: #31343a;
    --stroke: #3f434a;
    --text: #e6e6e6;
    --muted: #b2b2b2;
    --accent: #8ab4f8;
    --accent-rgb: 138,180,248;

    --danger: #ff6b6b;
    --ok: #7ee787;

    --field-bg: #17181b;
    --slot-bg: rgba(0,0,0,.12);
    --btn2-bg: #24262b;
    --toolbar-bg: rgba(30,31,34,.92);

    --shadow: 0 12px 40px rgba(0,0,0,.4);

    --stripe-data: hsla(210, 80%, 70%, .35);
    --stripe-method: hsla(280, 80%, 72%, .45);
    --stripe-rw: hsla(190, 80%, 60%, .45);
    --stripe-parent: hsla(45, 90%, 60%, .45);
    --stripe-arg: hsla(140, 70%, 55%, .45);
    --stripe-literal: hsla(0, 80%, 65%, .45);
    --stripe-literalBlock: hsla(25, 90%, 60%, .45);
    --stripe-lexical: hsla(330, 80%, 65%, .45);
    --stripe-indexed: hsla(160, 70%, 55%, .45);
  }
}

:root[data-theme="light"] {
  --bg: #c7ccd6;
  --panel: #dde2ea;
  --panel2: #d4d9e3;
  --stroke: #aeb6c6;
  --text: #0b1220;
  --muted: #2b3550;
  --accent: #1f6feb;
  --accent-rgb: 31,111,235;

  --danger: #d1242f;
  --ok: #1a7f37;

  --field-bg: #f4f6fb;
  --slot-bg: #eef2f8;
  --btn2-bg: #edf1f7;
  --toolbar-bg: rgba(199, 204, 214, .92);

  --shadow: 0 10px 28px rgba(0,0,0,.12);

  --stripe-data: hsla(210, 85%, 45%, .35);
  --stripe-method: hsla(280, 75%, 55%, .35);
  --stripe-rw: hsla(190, 80%, 40%, .35);
  --stripe-parent: hsla(45, 90%, 45%, .35);
  --stripe-arg: hsla(140, 70%, 40%, .35);
  --stripe-literal: hsla(0, 80%, 50%, .35);
  --stripe-literalBlock: hsla(25, 90%, 45%, .35);
  --stripe-lexical: hsla(330, 80%, 50%, .35);
  --stripe-indexed: hsla(160, 80%, 35%, .35);
}

:root[data-theme="dark"] {
  --bg: #1e1f22;
  --panel: #2b2d31;
  --panel2: #31343a;
  --stroke: #3f434a;
  --text: #e6e6e6;
  --muted: #b2b2b2;
  --accent: #8ab4f8;
  --accent-rgb: 138,180,248;

  --danger: #ff6b6b;
  --ok: #7ee787;

  --field-bg: #17181b;
  --slot-bg: rgba(0,0,0,.12);
  --btn2-bg: #24262b;
  --toolbar-bg: rgba(30,31,34,.92);

  --shadow: 0 12px 40px rgba(0,0,0,.4);

  --stripe-data: hsla(210, 80%, 70%, .35);
  --stripe-method: hsla(280, 80%, 72%, .45);
  --stripe-rw: hsla(190, 80%, 60%, .45);
  --stripe-parent: hsla(45, 90%, 60%, .45);
  --stripe-arg: hsla(140, 70%, 55%, .45);
  --stripe-literal: hsla(0, 80%, 65%, .45);
  --stripe-literalBlock: hsla(25, 90%, 60%, .45);
  --stripe-lexical: hsla(330, 80%, 65%, .45);
    --stripe-indexed: hsla(160, 70%, 55%, .45);
}

* { box-sizing: border-box; }

html, body {
  height: 100%;
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
}

.toolbar {
  display: flex;
  gap: 12px;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  border-bottom: 1px solid var(--stroke);
  background: var(--toolbar-bg);
  backdrop-filter: blur(8px);
  position: sticky;
  top: 0;
  z-index: 9999;
}

.toolbar__left { display: flex; gap: 10px; align-items: baseline; }
.toolbar__hint { color: var(--muted); font-size: 12px; }
.toolbar__right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

.toolbar__search {
  width: min(420px, 40vw);
  padding: 7px 10px;
  border: 1px solid var(--stroke);
  background: var(--field-bg);
  color: var(--text);
  border-radius: 8px;
  outline: none;
}
.toolbar__search:focus { border-color: var(--accent); }

.btn {
  padding: 7px 10px;
  border: 1px solid var(--stroke);
  background: var(--panel);
  color: var(--text);
  border-radius: 8px;
  cursor: pointer;
}
.btn:hover { border-color: #5a606a; }
.btn:active { transform: translateY(1px); }

.workspace {
  position: relative;
  height: calc(100% - 54px);
  overflow: hidden;
}

.linkLayer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1000000;
}

.linkLine {
  fill: none;
  stroke: rgba(var(--accent-rgb), .30);
  stroke-width: 2;
  stroke-linecap: round;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,.45));
}

.linkEndpoint {
  fill: rgba(var(--accent-rgb), .30);
  stroke: rgba(var(--accent-rgb), .65);
  stroke-width: 2;
  pointer-events: all;
  cursor: pointer;
}
.linkEndpoint:hover {
  fill: rgba(var(--accent-rgb), .55);
}


.outliner {
  position: absolute;
  min-width: 300px;
  min-height: 280px;
  width: 450px;
  height: 420px;
  background: var(--panel);
  border: 1px solid var(--stroke);
  border-radius: 10px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  resize: both;
}

.outliner:focus-within { border-color: var(--accent); }

.outliner__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 8px 8px 10px;
  background: linear-gradient(180deg, var(--panel2), var(--panel));
  border-bottom: 1px solid var(--stroke);
  cursor: grab;
  user-select: none;
}
.outliner__header:active { cursor: grabbing; }

.header__title { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.header__titleLine { display: flex; gap: 8px; align-items: baseline; min-width: 0; }

.badge {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  padding: 2px 6px;
  border: 1px solid var(--stroke);
  border-radius: 999px;
  background: rgba(0,0,0,.2);
}

.objLabel {
  font-family: var(--mono);
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.objLabel[contenteditable="true"] { outline: none; border-radius: 6px; padding: 2px 4px; }
.objLabel[contenteditable="true"]:focus { background: rgba(138,180,248,.12); }

.header__kind { font-size: 12px; color: var(--muted); }

.header__actions { display: flex; gap: 4px; align-items: center; }

.iconBtn {
  padding: 5px 8px;
  font-size: 12px;
  border: 1px solid var(--stroke);
  background: var(--btn2-bg);
  color: var(--text);
  border-radius: 8px;
  cursor: pointer;
}
.iconBtn:hover { border-color: #5a606a; }
.iconBtn.danger { border-color: rgba(255,107,107,.5); color: var(--danger); }

.outliner__body {
  flex: 1;
  overflow: auto;
  padding: 6px;
}

.sectionTitle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: var(--muted);
  font-size: 12px;
  font-family: var(--mono);
  margin: 2px 0 4px;
}

.slotList { display: flex; flex-direction: column; gap: 4px; }

.slotRow {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 5px 6px 6px 12px;
  border: 1px solid var(--stroke);
  border-radius: 8px;
  background: var(--slot-bg);
}

.slotTop {
  display: grid;
  grid-template-columns: 18px minmax(110px, 1.1fr) minmax(200px, 2fr) 18px;
  gap: 8px;
  align-items: center;
  min-width: 0;
}

.slotBottom {
  display: none;
  gap: 10px;
  align-items: center;
  justify-content: space-between;
  padding-left: 0;
}

.slotRow[data-controls="open"] .slotBottom {
  display: flex;
}

.slotStripe {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 6px;
  border-radius: 8px 0 0 8px;
  background: var(--stripe-data);
}
.slotStripe[data-kind="data"] { background: var(--stripe-data); }
.slotStripe[data-kind="method"] { background: var(--stripe-method); }
.slotStripe[data-kind="rw"] { background: var(--stripe-rw); }
.slotStripe[data-kind="parent"] { background: var(--stripe-parent); }
.slotStripe[data-kind="arg"] { background: var(--stripe-arg); }
.slotStripe[data-kind="literal"] { background: var(--stripe-literal); }
.slotStripe[data-kind="literalBlock"] { background: var(--stripe-literalBlock); }
.slotStripe[data-kind="lexical"] { background: var(--stripe-lexical); }
.slotStripe[data-kind="indexed"] { background: var(--stripe-indexed); }


.slotName {
  font-family: var(--mono);
  font-size: 12px;
  padding: 2px 4px;
  border-radius: 6px;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.slotName[contenteditable="true"]:focus { background: rgba(138,180,248,.12); outline: none; }

.slotValue { min-width: 0; display: flex; align-items: center; gap: 8px; }

.slotValueChip {
  flex: 1;
  min-width: 0;
  padding: 3px 6px;
  border: 1px solid var(--stroke);
  border-radius: 999px;
  background: var(--field-bg);
  font-family: var(--mono);
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.slotValueChip[contenteditable="true"] { cursor: text; border-radius: 8px; }
.slotValueChip[contenteditable="true"]:focus { outline: none; background: rgba(138,180,248,.12); }

.slotFlags { display: flex; gap: 4px; align-items: center; justify-content: flex-end; }

.flag { display: inline-flex; gap: 4px; align-items: center; font-size: 11px; color: var(--muted); font-family: var(--mono); }
.flag input { accent-color: var(--accent); }

.slotActions { display: flex; gap: 4px; justify-content: flex-end; }

.smallBtn {
  padding: 3px 7px;
  border: 1px solid var(--stroke);
  background: var(--btn2-bg);
  color: var(--text);
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
}
.smallBtn:hover { border-color: #5a606a; }
.smallBtn.danger { color: var(--danger); border-color: rgba(255,107,107,.45); }

.grip {
  width: 16px;
  height: 16px;
  display: grid;
  place-items: center;
  border: 1px solid var(--stroke);
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  background: rgba(0,0,0,.2);
  cursor: pointer;
  user-select: none;
}

.grip[data-active="true"] {
  border-color: var(--accent);
  color: var(--text);
  background: rgba(138,180,248,.15);
}

.kv {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 8px;
  padding: 6px;
  border: 1px solid var(--stroke);
  border-radius: 8px;
  background: var(--slot-bg);
  margin-bottom: 8px;
}
.kv__k { font-family: var(--mono); font-size: 12px; color: var(--muted); }
.kv__v { font-family: var(--mono); font-size: 12px; }

.codeTabs {
  display: inline-flex;
  gap: 4px;
  align-items: center;
}

.tabBtn {
  padding: 4px 8px;
  border: 1px solid var(--stroke);
  background: rgba(0,0,0,.18);
  color: var(--text);
  border-radius: 999px;
  font-size: 12px;
  cursor: pointer;
  font-family: var(--mono);
}
.tabBtn[data-active="true"] { border-color: var(--accent); background: rgba(138,180,248,.12); }

.codeArea {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.codeArea textarea {
  width: 100%;
  min-height: 140px;
  resize: vertical;
  border: 1px solid var(--stroke);
  background: var(--field-bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px;
  border-radius: 8px;
  outline: none;
}
.codeArea textarea:focus { border-color: var(--accent); }

.headerLine {
  display: flex;
  gap: 8px;
  align-items: center;
}

.headerInput {
  flex: 1;
  padding: 6px 8px;
  border: 1px solid var(--stroke);
  background: var(--field-bg);
  color: var(--text);
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 12px;
  outline: none;
}
.headerInput:focus { border-color: var(--accent); }

.evalHint {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  line-height: 1.3;
}

.toast {
  position: fixed;
  left: 12px;
  bottom: 12px;
  background: rgba(0,0,0,.65);
  border: 1px solid var(--stroke);
  padding: 10px 12px;
  border-radius: 10px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  opacity: 0;
  pointer-events: none;
  transition: opacity .18s ease;
  max-width: min(680px, calc(100vw - 24px));
  z-index: 1000001;
}
.toast.show { opacity: 1; }

.dropTarget {
  outline: 2px dashed rgba(138,180,248,.8);
  outline-offset: 2px;
}


.slotToggle{
  width: 18px;
  height: 18px;
  padding: 0;
  border: 1px solid var(--stroke);
  background: rgba(0,0,0,.18);
  color: var(--muted);
  border-radius: 6px;
  cursor: pointer;
  line-height: 16px;
  font-size: 12px;
}
.slotToggle:hover{ border-color:#5a606a; }

  

.helpDoc{
  padding: 10px;
  border: 1px solid var(--stroke);
  border-radius: 10px;
  background: var(--field-bg);
  color: var(--text);
  font-family: var(--sans);
}
.helpDoc h1, .helpDoc h2, .helpDoc h3{
  font-family: var(--sans);
  margin: 10px 0 6px;
}
.helpDoc h1{ font-size: 18px; }
.helpDoc h2{ font-size: 14px; color: var(--muted); }
.helpDoc ul{ margin: 6px 0 10px 18px; }
.helpDoc code{ font-family: var(--mono); background: rgba(0,0,0,.08); padding: 1px 4px; border-radius: 6px; }
@media (prefers-color-scheme: dark){
  .helpDoc code{ background: rgba(255,255,255,.08); }
}


/* Error report outliner */
.outliner[data-kind="errorReport"] {
  border-color: rgba(255, 90, 90, .85);
}

.outliner[data-kind="errorReport"] .outliner__header {
  background: linear-gradient(180deg, rgba(255,90,90,.22), rgba(255,90,90,.10));
  border-bottom-color: rgba(255, 90, 90, .45);
}

.outliner[data-kind="errorReport"] .badge {
  border-color: rgba(255, 90, 90, .55);
  color: rgba(255, 130, 130, 1);
}
</style>

  <style data-selfie-file="true" data-name="selfie_shell.css">

/* Image view sizing (workspace is nested inside #imagePane) */
#imagePane {
  height: calc(100vh - 54px);
  display: block;
}
#imagePane .workspace {
  height: 100%;
}
/* Selfie VM view (file editor) */
.vmRoot {
  height: calc(100vh - 54px);
  display: none;
}

.vmRoot[aria-hidden="false"] { display: grid; grid-template-columns: 320px 1fr; }

.vmSidebar {
  border-right: 1px solid var(--stroke);
  background: rgba(0,0,0,.04);
  display: flex;
  flex-direction: column;
  min-width: 260px;
}

.vmSidebar__toolbar {
  padding: 10px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--stroke);
}

.vmList {
  flex: 1;
  overflow: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.vmItem {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: center;
  padding: 8px 8px;
  border: 1px solid var(--stroke);
  border-radius: 10px;
  background: rgba(0,0,0,.06);
  cursor: pointer;
}

.vmItem[data-active="true"] {
  border-color: var(--accent);
  background: rgba(31,111,235,.10);
}

.vmItem__name {
  font-family: var(--mono);
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.vmBadge {
  font-family: var(--mono);
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 999px;
  border: 1px solid var(--stroke);
  color: var(--muted);
  background: rgba(0,0,0,.10);
}

.vmEditor {
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.vmEditor__toolbar {
  padding: 10px;
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--stroke);
  background: rgba(0,0,0,.02);
}

.vmEditor__title {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.vmEditor__actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.vmEditor__body {
  flex: 1;
  overflow: hidden;
  padding: 10px;
}

#fileEditor {
  width: 100%;
  height: 100%;
}

.CodeMirror {
  height: 100% !important;
  border: 1px solid var(--stroke);
  border-radius: 12px;
  overflow: hidden;
  font-family: var(--mono);
  font-size: 12px;
}

/* view switch buttons */
.viewSwitch {
  display: inline-flex;
  gap: 6px;
  margin-left: 10px;
}
.viewSwitch .btn[aria-pressed="true"] {
  border-color: var(--accent);
  background: rgba(31,111,235,.12);
}
  

.vmItem__actions{
  display:flex;
  gap:6px;
  align-items:center;
  justify-content:flex-end;
}

.vmIconBtn{
  width: 28px;
  height: 24px;
  padding: 0;
  border: 1px solid var(--stroke);
  background: rgba(0,0,0,.10);
  color: var(--text);
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  line-height: 22px;
}
.vmIconBtn:hover{ border-color: var(--accent); }
</style>
</head>
<body>
  <div id="toolbar" class="toolbar">
    <div class="toolbar__left">
      <strong>Selfie</strong>

## Windows
- Drag header to move; resize from bottom-right.
- Click a window to focus (bring to front).

## References and lines
- Click the \`::\` handle to open the referenced object and toggle its line.
- Drag the \`::\` handle to retarget (drop on an object header/value).
- Shift-click \`::\` on a block literal opens the literal *template* instead of the instantiated closure.
- Toolbar: **Hide lines** toggles all lines.

## Editing slot values
- Numbers: \`42\`  | Names: \`#foo\`  | Object refs: \`@3\`  | Strings: \`'text'\`  | empty ⇒ \`null\`

## Source language
- Literals: numbers, strings, blocks \`[ ... ]\` or \`[:x :y | ... ]\`
- Messages: unary (\`x size\`), binary (\`x + y\`), keyword (\`obj at: i Put: v\`)
- Temps: \`| t u |\` and assignment via setter: \`t: expr\`
- Return: \`^ expr\`  Statements: \`.\`

## Bytecode
- \`pushSelf\` | \`send <selector> [argc]\` | \`resend <selector> [argc]\` | \`primitiveSend <selector> [argc]\` | \`dup\` | \`pop\` | \`returnTop\`

## Slot controls
- Use the \`▾/▴\` toggle to show/hide slot flags and delete.


---

## Language summary

Selfie is a small Self-like message language:

- **Everything is a message send**. There are no special assignment operators.
- **Temporaries are RW slots** on the activation; assignment is sending the setter message:
  - \`| a |\` declares RW temp slot \`a\`
  - \`a: 10.\` assigns (setter send)
- **Return** uses \`^ expr\`.

### Message syntax

- **Unary**: \`x printString\`
- **Binary**: \`x + 1\`, \`resend.+ 5\`
- **Keyword**: \`x min: 17 Max: 23\`

### Blocks

- Literal block: \`[ ... ]\`
- Arguments: \`[ :x :y | ... ]\`
- Execute via \`value\`, \`value:\`, \`value:With:\` …
- Control blocks available on blocks:
  - \`whileTrue\`, \`whileTrue:\`, \`whileFalse\`, \`whileFalse:\`, \`repeat\`

### Resend

Selfie supports Self-style resend forms:

- **Undirected resend** (continue lookup in the *holder’s* parents):
  - \`resend.display\`
  - \`resend.+ 5\`
  - \`resend.min: 17 Max: 23\`

- **Directed resend** (start from a specific parent slot):
  - \`listParent.height\`
  - \`intParent.min: 17 Max: 23\`

**Disambiguation rule:**
- \`a.b\` (no whitespace after the dot) is parsed as directed resend.
- \`a. b\` is parsed as two statements (\`a.\` then \`b\`).

---

## Grammar (EBNF)

This is the grammar used by the parser (simplified, but matches the implementation):

\`\`\`ebnf
Program        ::= Stmt ('.' Stmt)* '.'?
Stmt           ::= Return | Expr
Return         ::= '^' Expr

Expr           ::= KeywordChain
KeywordChain   ::= BinaryChain (KeywordMsg BinaryChain)+ | BinaryChain
KeywordMsg     ::= KeywordPart (KeywordPart)*
KeywordPart    ::= Ident ':'

BinaryChain    ::= UnaryChain (BinaryOp UnaryChain)*
UnaryChain     ::= Primary (UnaryMsg | ResendMsg)*
UnaryMsg       ::= Ident

ResendMsg      ::= UndirectedResend | DirectedResend
UndirectedResend ::= 'resend' '.' (Ident | BinaryOp | KeywordHead)
DirectedResend ::= ParentSlot '.' (Ident | BinaryOp | KeywordHead)
KeywordHead    ::= Ident ':'
ParentSlot     ::= Ident

Primary        ::= Number | String | Name | Ref | Block | Paren | Ident
Paren          ::= '(' Expr ')'
Block          ::= '[' BlockArgs? BlockTemps? Program? ']'
BlockArgs      ::= (':' Ident)+ '|'
BlockTemps     ::= '|' Ident* '|'

Name           ::= '#' Ident
String         ::= '\'' ( ... ) '\''
Ref            ::= '@' Number
Number         ::= Digit+ ('.' Digit+)?
BinaryOp       ::= one-or-more of: + - * / < <= > >= == ~= != ,
Ident          ::= [A-Za-z_][A-Za-z0-9_]*
\`\`\`

Notes:
- \`| a b |\` declares RW temporaries on the activation.
- \`a:\` is the setter message for RW slot \`a\`.

---

## Object model notes

- **Parent slots** (marked with \`*\`) participate in lookup delegation.
- **Indexed slots** are ignored by lookup and are addressed by 1-based index in the UI.
- Boolean results are Selfie objects \`true\`/\`false\` (not JS booleans).

---

## VM / File view

- **Image view** is the floating outliner desktop.
- **VM view** lets you edit the embedded files (scripts/styles) that make up the current system.
- **Save system** writes a single self-contained HTML (TiddlyWiki-like).
- **Save image** writes a \`.selfieImage\` JSON snapshot.

---

## JS bridge

Global \`js\` object:

  function parseValueText(text) {

    if (raw === 'null') return { ok: true, value: vm.nil };
    if (raw === 'nil') return { ok: true, value: vm.nil };
    if (raw === 'true') return { ok: true, value: vm.trueObj };
    if (raw === 'false') return { ok: true, value: vm.falseObj };
    if (raw === 'undefined') return { ok: true, value: undefined };

    if (raw.startsWith('#') && raw.length > 1 && !/^#\d+$/.test(raw)) {

  const linkLayer = document.createElementNS(SVG_NS, 'svg');
  linkLayer.classList.add('linkLayer');

  // SVG masking: hide lines under the focused outliner (except lines that start/end on it).
  const defs = document.createElementNS(SVG_NS, 'defs');
  const focusMask = document.createElementNS(SVG_NS, 'mask');
  focusMask.id = 'focusMask';

  const maskBg = document.createElementNS(SVG_NS, 'rect');
  maskBg.setAttribute('x', '0');
  maskBg.setAttribute('y', '0');
  maskBg.setAttribute('fill', 'white');

  const maskHole = document.createElementNS(SVG_NS, 'rect');
  maskHole.setAttribute('x', '0');
  maskHole.setAttribute('y', '0');
  maskHole.setAttribute('width', '0');
  maskHole.setAttribute('height', '0');
  maskHole.setAttribute('fill', 'black');

  focusMask.appendChild(maskBg);
  focusMask.appendChild(maskHole);
  defs.appendChild(focusMask);
  linkLayer.appendChild(defs);

  const maskedGroup = document.createElementNS(SVG_NS, 'g');
  maskedGroup.setAttribute('mask', 'url(#focusMask)');
  const plainGroup = document.createElementNS(SVG_NS, 'g');
  linkLayer.appendChild(maskedGroup);
  linkLayer.appendChild(plainGroup);

  workspace.appendChild(linkLayer);

  const Links = {
    entries: new Map(),
    hiddenAll: false,
    _raf: 0,
    focusKey: null,

    key(srcId, slotName) { return `${srcId}:${slotName}`; },


_ensure(srcId, slotName) {
  const k = this.key(srcId, slotName);
  let e = this.entries.get(k);
  if (!e) {
    const path = document.createElementNS(SVG_NS, 'path');
    path.classList.add('linkLine');

    const circle = document.createElementNS(SVG_NS, 'circle');
    circle.classList.add('linkEndpoint');
    circle.setAttribute('r', '5');
    circle.style.display = 'none';
    circle.addEventListener('click', (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      Links.setVisible(srcId, slotName, false);
    });

    maskedGroup.appendChild(path);
    maskedGroup.appendChild(circle);

    e = { srcId, slotName, fromEl: null, targetId: NaN, visible: false, path, circle };
    this.entries.set(k, e);
  }
  return e;
},


    bindFromEl(srcId, slotName, fromEl) {
      const e = this._ensure(srcId, slotName);
      e.fromEl = fromEl;
      this.schedule();
    },

    setTarget(srcId, slotName, targetId) {
      const e = this._ensure(srcId, slotName);
      e.targetId = Number.isFinite(Number(targetId)) ? Number(targetId) : NaN;
      this.schedule();
    },

    setVisible(srcId, slotName, visible) {
      const e = this._ensure(srcId, slotName);
      e.visible = !!visible;
      this.schedule();
    },

    toggleVisible(srcId, slotName) {
      const e = this._ensure(srcId, slotName);
      e.visible = !e.visible;
      this.schedule();
    },


remove(srcId, slotName) {
  const k = this.key(srcId, slotName);
  const e = this.entries.get(k);
  if (!e) return;
  e.path.remove();
  if (e.circle) e.circle.remove();
  this.entries.delete(k);
  this.schedule();
},


    toggleAllHidden() {
      this.hiddenAll = !this.hiddenAll;
      this.schedule();
    },

    setFocus(winKey) {
      this.focusKey = winKey || null;
      this.schedule();
    },

    schedule() {
      if (this._raf) return;
      this._raf = window.requestAnimationFrame(() => {
        this._raf = 0;
        this.draw();
      });
    },

    _center(domEl, wsRect) {
      const r = domEl.getBoundingClientRect();
      return { x: (r.left - wsRect.left) + r.width / 2, y: (r.top - wsRect.top) + r.height / 2 };
    },


  draw() {
    const wsRect = workspace.getBoundingClientRect();
    const w = Math.max(1, wsRect.width);
    const h = Math.max(1, wsRect.height);
    linkLayer.setAttribute('width', String(w));
    linkLayer.setAttribute('height', String(h));
    linkLayer.setAttribute('viewBox', `0 0 ${w} ${h}`);


    // Update focus mask dimensions
    maskBg.setAttribute('width', String(w));
    maskBg.setAttribute('height', String(h));

    let focusRect = null;
    if (this.focusKey) {
      const fw = Outliners.windows.get(this.focusKey);
      if (fw && fw.root && fw.root.isConnected) {
        const fr = fw.root.getBoundingClientRect();
        focusRect = {
          x: fr.left - wsRect.left,
          y: fr.top - wsRect.top,
          w: fr.width,
          h: fr.height
        };
      }
    }

    if (focusRect) {
      maskHole.setAttribute('x', String(focusRect.x));
      maskHole.setAttribute('y', String(focusRect.y));
      maskHole.setAttribute('width', String(focusRect.w));
      maskHole.setAttribute('height', String(focusRect.h));
    } else {
      maskHole.setAttribute('x', '0');
      maskHole.setAttribute('y', '0');
      maskHole.setAttribute('width', '0');
      maskHole.setAttribute('height', '0');
    }

    const intersectRect = (p1, p2, rect) => {
      const dx = p2.x - p1.x;
      const dy = p2.y - p1.y;
      if (dx === 0 && dy === 0) return null;

      const candidates = [];

      const pushIf = (t, x, y) => {
        if (!(t > 0)) return;
        if (x >= rect.x - 0.01 && x <= rect.x + rect.w + 0.01 && y >= rect.y - 0.01 && y <= rect.y + rect.h + 0.01) {
          candidates.push({ t, x, y });
        }
      };

      if (dx !== 0) {
        const tL = (rect.x - p1.x) / dx;
        pushIf(tL, rect.x, p1.y + tL * dy);
        const tR = (rect.x + rect.w - p1.x) / dx;
        pushIf(tR, rect.x + rect.w, p1.y + tR * dy);
      }
      if (dy !== 0) {
        const tT = (rect.y - p1.y) / dy;
        pushIf(tT, p1.x + tT * dx, rect.y);
        const tB = (rect.y + rect.h - p1.y) / dy;
        pushIf(tB, p1.x + tB * dx, rect.y + rect.h);
      }

      if (candidates.length === 0) return null;
      candidates.sort((a, b) => a.t - b.t);
      return { x: candidates[0].x, y: candidates[0].y };
    };



    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

    const insideRect = (p, rect) =>
      p.x >= rect.x && p.x <= rect.x + rect.w && p.y >= rect.y && p.y <= rect.y + rect.h;

    const closestBorderPoint = (p, rect) => {
      const dl = p.x - rect.x;
      const dr = (rect.x + rect.w) - p.x;
      const dt = p.y - rect.y;
      const db = (rect.y + rect.h) - p.y;

      const minH = Math.min(dl, dr);
      const minV = Math.min(dt, db);

      // Prefer horizontal (left/right) when tied.
      if (minH <= minV) {
        if (dl <= dr) return { x: rect.x, y: clamp(p.y, rect.y, rect.y + rect.h) };
        return { x: rect.x + rect.w, y: clamp(p.y, rect.y, rect.y + rect.h) };
      }
      if (dt <= db) return { x: clamp(p.x, rect.x, rect.x + rect.w), y: rect.y };
      return { x: clamp(p.x, rect.x, rect.x + rect.w), y: rect.y + rect.h };
    };
    for (const e of this.entries.values()) {
      const fromEl = e.fromEl;
      const targetObj = Number.isFinite(e.targetId) ? findObjectById(e.targetId) : null;
      const targetWin = targetObj ? Outliners.windows.get(identityKey(targetObj)) : null;


      // Decide whether to mask this connection under the focused outliner.
      // Lines that start from OR end on the focused outliner are NOT masked.
      const focusKey = this.focusKey;
      let wantPlain = false;
      if (focusKey && fromEl && fromEl.isConnected) {
        const fromWinKey = (fromEl.closest && fromEl.closest('.outliner')) ? fromEl.closest('.outliner').dataset.winKey : null;
        const targetWinKey = targetWin && targetWin.root ? targetWin.root.dataset.winKey : null;
        wantPlain = (fromWinKey === focusKey) || (targetWinKey === focusKey);
      }

      const canDraw = !this.hiddenAll
        && e.visible
        && fromEl && fromEl.isConnected
        && targetWin && targetWin.root && targetWin.root.isConnected;

      // Move SVG elements into masked/unmasked group depending on focus.
      const parentGroup = wantPlain ? plainGroup : maskedGroup;
      if (e.path.parentNode !== parentGroup) parentGroup.appendChild(e.path);
      if (e.circle && e.circle.parentNode !== parentGroup) parentGroup.appendChild(e.circle);

      if (!canDraw) {
        e.path.style.display = 'none';
        if (e.circle) e.circle.style.display = 'none';
        if (fromEl && fromEl.isConnected) fromEl.dataset.active = 'false';
        continue;
      }

      const p1 = this._center(fromEl, wsRect);

      const tr = targetWin.root.getBoundingClientRect();
      const rect = { x: tr.left - wsRect.left, y: tr.top - wsRect.top, w: tr.width, h: tr.height };
      const center = { x: rect.x + rect.w / 2, y: rect.y + rect.h / 2 };
      const startInside = insideRect(p1, rect);
      const end = startInside ? closestBorderPoint(p1, rect) : (intersectRect(p1, center, rect) || center);

      if (startInside) {
        // If the start point is inside the target outliner, only show the endpoint circle on the border.
        e.path.style.display = 'none';
      } else {
        // Curve from handle to border point.
        const dx = Math.max(28, Math.min(240, Math.abs(end.x - p1.x) * 0.5));
        const c1x = p1.x + dx;
        const c2x = end.x - dx;

        e.path.setAttribute('d', `M ${p1.x.toFixed(1)} ${p1.y.toFixed(1)} C ${c1x.toFixed(1)} ${p1.y.toFixed(1)} ${c2x.toFixed(1)} ${end.y.toFixed(1)} ${end.x.toFixed(1)} ${end.y.toFixed(1)}`);
        e.path.style.display = '';
      }

      if (e.circle) {
        e.circle.setAttribute('cx', end.x.toFixed(1));
        e.circle.setAttribute('cy', end.y.toFixed(1));
        e.circle.style.display = '';
      }

      fromEl.dataset.active = 'true';
    }
  }
};

// ---------------------------------------------------------------------------
// Outliner manager

  // ---------------------------------------------------------------------------

  const Outliners = {
    z: 10,
    windows: new Map(), // identityKey(value) -> OutlinerWindow

    open(value, pos, meta) {
      const key = identityKey(value);
      if (this.windows.has(key)) {
        const win = this.windows.get(key);
        if (meta && !win.meta) win.meta = meta;
        win.bringToFront();
        win.flash();
        return win;
      }
      const win = new OutlinerWindow(value, pos, meta);
      this.windows.set(key, win);
      workspace.appendChild(win.root);
      win.bringToFront();
      Links.schedule();
      return win;
    },

    close(value) {
      const key = identityKey(value);
      const win = this.windows.get(key);
      if (!win) return;
      this.windows.delete(key);
      if (win._resizeObs) try { win._resizeObs.disconnect(); } catch {}
      win.root.remove();
      if (Links.focusKey === key) Links.setFocus(null);
      Links.schedule();
    }
  };

  // ---------------------------------------------------------------------------
  // Drag-and-drop payloads
  // ---------------------------------------------------------------------------

  const DND = {
    MIME_OBJ: 'application/x-selflike-object',
    MIME_SLOT_REF: 'application/x-selflike-slotref',

    setObject(dt, obj) { dt.setData(this.MIME_OBJ, JSON.stringify({ objectId: obj.id })); },
    setSlotRef(dt, srcObj, slotName) { dt.setData(this.MIME_SLOT_REF, JSON.stringify({ sourceId: srcObj.id, slotName })); },

    getObject(payloadText) {
      try {
        const p = JSON.parse(payloadText);
        if (!p || !Number.isFinite(Number(p.objectId))) return null;
        return findObjectById(p.objectId);
      } catch { return null; }
    },

    getSlotRef(payloadText) {
      try {
        const p = JSON.parse(payloadText);
        if (!p || !Number.isFinite(Number(p.sourceId)) || typeof p.slotName !== 'string') return null;
        const srcObj = findObjectById(p.sourceId);
        if (!srcObj) return null;
        return { srcObj, slotName: p.slotName };
      } catch { return null; }
    }
  };

  // Workspace drop: open object at drop position.
  workspace.addEventListener('dragover', (ev) => {
    if (ev.dataTransfer.types.includes(DND.MIME_OBJ)) {
      ev.preventDefault();
      ev.dataTransfer.dropEffect = 'copy';
    }
  });

  workspace.addEventListener('drop', (ev) => {
    const obj = DND.getObject(ev.dataTransfer.getData(DND.MIME_OBJ));
    if (!obj) return;
    ev.preventDefault();
    const rect = workspace.getBoundingClientRect();
    Outliners.open(obj, { x: ev.clientX - rect.left, y: ev.clientY - rect.top });
  });

  // ---------------------------------------------------------------------------
  // Outliner window
  // ---------------------------------------------------------------------------

  class OutlinerWindow {
    constructor(value, pos, meta) {
      this.value = value;
      this.key = identityKey(value);
      this.meta = meta || null;

      // UI state
      this._evalView = 'source';
      this._evalSource = "self";
      this._evalBytecode = "pushSelf\nsend self\nreturnTop";
      this._evalLiterals = [];
      this._blockInstanceCache = new Map();

      this._codeView = 'source'; // for method templates
      this._methodHeader = '';
      this._methodSource = '';

      this.root = el('div', { class: 'outliner', tabindex: '0' });

      // Used by link-layer masking to detect whether a link originates/ends on the focused outliner.
      this.root.dataset.winKey = this.key;
      this.root.dataset.kind = (this.value && this.value.kind) ? this.value.kind : '';

      const { x, y } = this._defaultPos(pos);
      this.root.style.left = `${x}px`;
      this.root.style.top = `${y}px`;

      this.header = el('div', { class: 'outliner__header' });
      this.body = el('div', { class: 'outliner__body' });
      this.root.append(this.header, this.body);

      this._wireMove();
      this._wireFocus();

      this._resizeObs = new ResizeObserver(() => Links.schedule());
      this._resizeObs.observe(this.root);

      this.render();
    }

    _defaultPos(pos) {
      if (pos && Number.isFinite(pos.x) && Number.isFinite(pos.y)) return pos;
      const count = Outliners.windows.size;
      return { x: 18 + (count % 10) * 22, y: 72 + (count % 10) * 22 };
    }

    bringToFront() {
      Outliners.z += 1;
      this.root.style.zIndex = String(Outliners.z);
      this.root.focus({ preventScroll: true });
      Links.setFocus(this.key);
    }

    flash() {
      this.root.classList.add('dropTarget');
      window.setTimeout(() => this.root.classList.remove('dropTarget'), 200);
    }

    _wireFocus() {
      this.root.addEventListener('mousedown', () => this.bringToFront());
    }

    _wireMove() {
      let dragging = false;
      let startX = 0, startY = 0;
      let startLeft = 0, startTop = 0;

      const onPointerDown = (ev) => {
        const t = ev.target;
        if (t.closest('button')) return;
        if (t.getAttribute('contenteditable') === 'true') return;
        if (t.tagName === 'TEXTAREA' || t.tagName === 'INPUT') return;
        dragging = true;
        this.bringToFront();
        this.header.setPointerCapture(ev.pointerId);
        startX = ev.clientX;
        startY = ev.clientY;
        startLeft = parseFloat(this.root.style.left || '0');
        startTop = parseFloat(this.root.style.top || '0');
        ev.preventDefault();
      };

      const onPointerMove = (ev) => {
        if (!dragging) return;
        const dx = ev.clientX - startX;
        const dy = ev.clientY - startY;
        this.root.style.left = `${Math.max(-20, startLeft + dx)}px`;
        this.root.style.top = `${Math.max(40, startTop + dy)}px`;
        Links.schedule();
      };

      const onPointerUp = (ev) => {
        if (!dragging) return;
        dragging = false;
        try { this.header.releasePointerCapture(ev.pointerId); } catch {}
      };

      this.header.addEventListener('pointerdown', onPointerDown);
      this.header.addEventListener('pointermove', onPointerMove);
      this.header.addEventListener('pointerup', onPointerUp);
      this.header.addEventListener('pointercancel', onPointerUp);

      // Drop slot-ref on header retargets the dragged slot to this object.
      this.header.addEventListener('dragover', (ev) => {
        if (ev.dataTransfer.types.includes(DND.MIME_SLOT_REF)) {
          ev.preventDefault();
          ev.dataTransfer.dropEffect = 'link';
          this.header.classList.add('dropTarget');
        }
      });
      this.header.addEventListener('dragleave', () => this.header.classList.remove('dropTarget'));
      this.header.addEventListener('drop', (ev) => {
        const slotRef = DND.getSlotRef(ev.dataTransfer.getData(DND.MIME_SLOT_REF));
        if (!slotRef) return;
        ev.preventDefault();
        this.header.classList.remove('dropTarget');
        retargetSlot(slotRef.srcObj, slotRef.slotName, this.value);
      });
    }

    render() {
      this.header.replaceChildren(this._renderHeader());
      this.body.replaceChildren(this._renderBody());
      Links.schedule();
    }

    _renderHeader() {
      const v = this.value;
      const kind = v && typeof v === 'object' && v.kind ? v.kind : typeof v;

      const badgeText = (v && typeof v === 'object' && typeof v.id === 'number') ? `#${v.id}` : this.key;
      const badge = el('span', { class: 'badge', draggable: (v && typeof v.id === 'number') ? 'true' : 'false' }, badgeText);
      if (v && typeof v === 'object' && typeof v.id === 'number') {
        badge.addEventListener('dragstart', (ev) => {
          DND.setObject(ev.dataTransfer, v);
          ev.dataTransfer.effectAllowed = 'copy';
        });
      }

      const label = el('div', { class: 'objLabel', contenteditable: (v && typeof v === 'object') ? 'true' : 'false', spellcheck: 'false' }, String((v && typeof v === 'object' && v.label != null) ? v.label : safeDescribe(v)));
      if (v && typeof v === 'object') {
        label.addEventListener('blur', () => {
          const txt = label.textContent.trim();
          if (!txt) { label.textContent = v.label || safeDescribe(v); return; }
          v.label = txt;
          Links.schedule();
        });
      }

      const title = el('div', { class: 'header__title' },
        el('div', { class: 'header__titleLine' }, badge, label),
        el('div', { class: 'header__kind' }, `kind: ${kind}`)
      );

      const btnClose = el('button', { class: 'iconBtn danger' }, 'Close');
      btnClose.addEventListener('click', () => Outliners.close(this.value));
      const btnRefresh = el('button', { class: 'iconBtn' }, 'Refresh');
      btnRefresh.addEventListener('click', () => this.render());

      const btnClone = el('button', { class: 'iconBtn' }, 'Clone');
      btnClone.addEventListener('click', () => {
        try {
          if (!v || typeof v !== 'object') return;
          const cloned = vm.send(v, 'clone', []);
          Outliners.open(cloned, { x: parseFloat(this.root.style.left) + 24, y: parseFloat(this.root.style.top) + 24 });
        } catch (e) {
          toast(e instanceof Error ? e.message : String(e), 'error');
          if (e instanceof VMError) openErrorReport(e);
        }
      });

      return el('div', { style: { display: 'flex', width: '100%', justifyContent: 'space-between', alignItems: 'center', gap: '10px' } },
        title,
        el('div', { class: 'header__actions' }, btnClone, btnRefresh, btnClose)
      );
    }

    _renderBody() {
      const v = this.value;

      // Help document (Markdown)
      if (v && typeof v === 'object' && v.kind === 'helpDoc') {
        const wrap = el('div', { class: 'helpDoc' });
        const md = String(v.markdown || '');
        if (window.marked && typeof window.marked.parse === 'function') {
          wrap.innerHTML = window.marked.parse(md);
        } else {
          wrap.appendChild(el('pre', { style: { whiteSpace: 'pre-wrap', margin: '0' } }, md));
        }
        return wrap;
      }


      // Method template view
      if (v && typeof v === 'object' && v.kind === 'methodTemplate') {
        return this._renderMethodTemplate(v);
      }

      // SystemContext
      if (v && typeof v === 'object' && v.kind === 'systemContext') {
        const wrap = el('div', {});
        wrap.appendChild(el('div', { class: 'kv' }, el('div', { class: 'kv__k' }, 'activationStackDepth'), el('div', { class: 'kv__v' }, String((v.activationStack || []).length))));
        wrap.appendChild(el('div', { class: 'kv' }, el('div', { class: 'kv__k' }, 'currentActivation'), el('div', { class: 'kv__v' }, safeDescribe(v.currentActivation))));
        wrap.appendChild(el('div', { class: 'kv' }, el('div', { class: 'kv__k' }, 'stringTableSize'), el('div', { class: 'kv__v' }, String((v.stringTable && v.stringTable.size) || 0))));
        return wrap;
      }

      // VM objects with slots
      if (v && typeof v === 'object' && v.slots && typeof v.slots === 'object') {
        const slotNames = Object.keys(v.slots);
        slotNames.sort((a, b) => {
          if (a === 'bytecode') return 1;
          if (b === 'bytecode') return -1;
          return a.localeCompare(b);
        });

        const list = el('div', { class: 'slotList' });
        for (const name of slotNames) list.appendChild(this._renderSlotRow(v, v.slots[name]));

        const btnAddData = el('button', { class: 'smallBtn', title: 'Add new data slot' }, 'ro');
        btnAddData.addEventListener('click', () => {
          const slotName = prompt('New data slot name:');
          if (!slotName) return;
          const sn = slotName.trim();
          if (!sn) return;
          if (vm.hasSlot(v, sn)) { toast(`Slot '${sn}' already exists.`, 'error'); return; }
          vm.addSlot(v, sn, vm.nil);
          this.render();
        });

        const btnAddRW = el('button', { class: 'smallBtn', title: 'Add new read/write slot (foo + foo:)' }, 'rw');
        btnAddRW.addEventListener('click', () => {
          const slotName = prompt('New read/write slot base name (e.g. foo):');
          if (!slotName) return;
          const sn = slotName.trim();
          if (!sn) return;
          if (sn.endsWith(':')) { toast('Use base name without colon (e.g. foo).', 'error'); return; }
          if (vm.hasSlot(v, sn)) { toast(`Slot '${sn}' already exists.`, 'error'); return; }
          vm.addSlot(v, sn, null, { isReadWrite: true });
          this.render();
        });

        const btnAddMethod = el('button', { class: 'smallBtn', title: 'Add new method slot' }, 'method');
        btnAddMethod.addEventListener('click', () => {
          const headerText = prompt('New method header (unary, binary, or keyword):', 'foo');
          if (headerText == null) return;
          const ht = headerText.trim();
          if (!ht) return;
          try {
            const h = parseMethodHeader(ht);
            const selector = h.selector;
            if (vm.hasSlot(v, selector)) { toast(`Slot '${selector}' already exists.`, 'error'); return; }
            // default empty method returns self
            const defaultSrc = 'self';
            const spec = compileSourceToMethodSpec(defaultSrc, { isMethod: true, headerText: ht });
            const mt = vm.newMethodTemplate({
              label: spec.selector,
              selectorHint: spec.selector,
              argNames: spec.argNames,
              literals: spec.literals,
              bytecode: spec.bytecode
            });
            mt.source = '';
            // temp slots
            for (const t of (spec.tempNames || [])) { if (!vm.hasSlot(mt, t)) vm.addSlot(mt, t, vm.nil, { isReadWrite: true }); }

            vm.addSlot(v, selector, mt);
            this.render();
            Outliners.open(mt, { x: parseFloat(this.root.style.left) + 24, y: parseFloat(this.root.style.top) + 24 }, { holderId: v.id, slotName: selector });
          } catch (e) {
            const msg = e instanceof Error ? e.message : String(e);
            toast(`Header error: ${msg}`, 'error');
          }
        });
        const indexed = this._renderIndexedSection(v);
        const evaluator = this._renderEvaluator(v);

        const addBar = el('div', { class: 'addBar', style: { display: 'flex', gap: '6px', alignItems: 'center' } },
          el('span', { style: { color: 'var(--muted)', fontFamily: 'var(--mono)', fontSize: '12px' } }, 'Add'),
          btnAddData,
          btnAddRW,
          btnAddMethod
        );

        return el('div', {},
          el('div', { class: 'sectionTitle' }, el('span', {}, 'Slots'), addBar),

      }

      return el('div', { class: 'kv' }, el('div', { class: 'kv__k' }, 'value'), el('div', { class: 'kv__v' }, safeDescribe(v)));
    }

    _renderTabs(active, onSelect) {
      const wrap = el('div', { class: 'codeTabs' });
      const btnSrc = el('button', { class: 'tabBtn', dataset: { active: active === 'source' ? 'true' : 'false' } }, 'Source');
      const btnBc = el('button', { class: 'tabBtn', dataset: { active: active === 'bytecode' ? 'true' : 'false' } }, 'Bytecode');

      btnBc.addEventListener('click', () => onSelect('bytecode'));

      return wrap;
    }

    _formatMethodHeader(methodTemplate) {
      const sel = methodTemplate.selectorHint || methodTemplate.label || '';
      const args = methodTemplate.argNames || [];

      // binary selector display: + arg
      if (args.length === 1 && /^[^A-Za-z0-9_]+$/.test(sel)) {
        return `${sel} ${args[0]}`;
      }

      // keyword selector display: at: x Put: y
      if (sel.includes(':') && args.length > 0) {
        const parts = sel.split(':');
        parts.pop();
        if (parts.length === args.length) {
          return parts.map((p, i) => `${p}: ${args[i]}`).join(' ');
        }
      }

      return sel;
    }

    _renderMethodTemplate(mt) {
      const wrapper = el('div', {});

      // Slots list (debug / literals / args) with 'bytecode' last if present
      const slotNames = Object.keys(mt.slots || {});
      slotNames.sort((a, b) => {
        if (a === 'bytecode') return 1;
        if (b === 'bytecode') return -1;
        return a.localeCompare(b);
      });
      const slotList = el('div', { class: 'slotList' });
      for (const name of slotNames) slotList.appendChild(this._renderSlotRow(mt, mt.slots[name]));

      wrapper.appendChild(el('div', { class: 'sectionTitle' }, el('span', {}, 'Slots')));
      wrapper.appendChild(slotList);

      // Code section
      const codeWrap = el('div', { class: 'codeArea' });
      const tabs = this._renderTabs(this._codeView, (v) => { this._codeView = v; this.render(); });

      const title = el('div', { class: 'sectionTitle', style: { marginTop: '12px' } },
        el('span', {}, 'Code'),
        tabs
      );
      codeWrap.appendChild(title);

      if (this._codeView === 'source') {
        const canInstall = !!(this.meta && Number.isFinite(this.meta.holderId) && typeof this.meta.slotName === 'string');
        const headerInit = this._methodHeader || this._formatMethodHeader(mt) || (this.meta ? this.meta.slotName : '');
        const bodyInit = this._methodSource || mt.source || '';
        this._methodHeader = headerInit;
        this._methodSource = bodyInit;

        const headerInput = el('input', { class: 'headerInput', value: headerInit, placeholder: "method header: foo  |  + arg  |  at: x Put: y" });
        headerInput.addEventListener('input', () => { this._methodHeader = headerInput.value; });

        const btnCompile = el('button', { class: 'btn' }, canInstall ? 'Compile & Install' : 'Compile (no holder)');
        const bodyTa = el('textarea', { spellcheck: 'false' }, bodyInit);
        bodyTa.addEventListener('input', () => { this._methodSource = bodyTa.value; });
        bodyTa.addEventListener('keydown', (ev) => {
          if ((ev.ctrlKey || ev.metaKey) && ev.key === 'Enter') { ev.preventDefault(); btnCompile.click(); }
        });

        btnCompile.addEventListener('click', () => {
          try {
            const spec = compileSourceToMethodSpec(bodyTa.value, { isMethod: true, headerText: headerInput.value });

            const canInstallNow = !!(this.meta && Number.isFinite(this.meta.holderId) && typeof this.meta.slotName === 'string');
            let holder = null;
            if (canInstallNow) {
              holder = findObjectById(this.meta.holderId);
              if (!holder) throw new VMError('Holder object not found.');

              const oldName = this.meta.slotName;
              const newName = spec.selector;

              if (!vm.hasSlot(holder, oldName)) throw new VMError(`Holder slot '${oldName}' no longer exists.`);
              if (newName !== oldName) {
                if (vm.hasSlot(holder, newName)) throw new VMError(`Cannot rename: holder already has slot '${newName}'.`);

                holder.slots[newName] = Object.assign({}, holder.slots[oldName], { name: newName });
                delete holder.slots[oldName];

                // migrate link state
                const oldKey = Links.key(holder.id, oldName);
                const ent = Links.entries.get(oldKey);
                if (ent) {
                  Links.entries.delete(oldKey);
                  ent.slotName = newName;
                  Links.entries.set(Links.key(holder.id, newName), ent);
                }

                this.meta.slotName = newName;
              }
            }

            // Update the *existing* method template in place (better install semantics).
            mt.label = spec.selector;
            mt.selectorHint = spec.selector;
            mt.source = spec.source;
            mt.bytecode = spec.bytecode;
            mt.instructions = vm.compileBytecode(mt.bytecode);
            mt.argNames = spec.argNames.slice();

            // Rebuild slots: parent/self + args + temps + literals
            const parentSlotName = mt.activationParentSlotName || 'self';
            mt.slots = Object.create(null);
            vm.addSlot(mt, parentSlotName, null, { isParent: true, isArgument: true });
            for (const a of spec.argNames) vm.addSlot(mt, a, null, { isArgument: true });
            for (const t of (spec.tempNames || [])) {
              if (!vm.hasSlot(mt, t)) vm.addSlot(mt, t, vm.nil, { isReadWrite: true });
            }
            for (const lit of (spec.literals || [])) {
              vm.intern(lit.slotName);
              vm.addSlot(mt, lit.slotName, lit.value, { isLiteral: true, literalKind: lit.kind === 'block' ? 'block' : 'constant' });
            }

            if (holder) {
              holder.slots[this.meta.slotName].value = mt;
              Outliners.open(holder).render();
            }

            // keep UI fields consistent
            this._methodHeader = spec.headerDisplay || spec.selector;
            headerInput.value = this._methodHeader;
            mt.source = bodyTa.value;

            Links.schedule();
            this.render();
            toast(holder ? 'Compiled & installed.' : 'Compiled (no holder context).', 'ok');
          } catch (e) {
            const msg = e instanceof Error ? e.message : String(e);
            toast(`Compile error: ${msg}`, 'error');
          }
        });

        const headerLine = el('div', { class: 'headerLine' }, headerInput, btnCompile);
        codeWrap.appendChild(headerLine);
        codeWrap.appendChild(bodyTa);
        codeWrap.appendChild(el('div', { class: 'evalHint' }, canInstall ? 'Ctrl+Enter: compile & install into holder slot.' : 'Opened method has no holder context; header rename/install disabled.'));
      } else {
        const ta = el('textarea', { spellcheck: 'false' }, String(mt.bytecode || ''));
        const btnApply = el('button', { class: 'btn' }, 'Apply bytecode');
        btnApply.addEventListener('click', () => {
          try {
            mt.bytecode = ta.value;
            mt.instructions = vm.compileBytecode(mt.bytecode);
            toast('Bytecode compiled.', 'ok');
          } catch (e) {
            const msg = e instanceof Error ? e.message : String(e);
            toast(`Compile error: ${msg}`, 'error');
          }
        });
        codeWrap.appendChild(el('div', { class: 'sectionTitle' }, el('span', {}, 'Bytecode'), btnApply));
        codeWrap.appendChild(ta);
      }

      wrapper.appendChild(codeWrap);
      return wrapper;
    }

    _renderEvaluator(holderObj) {
      const wrap = el('div', { class: 'codeArea', style: { marginTop: '12px' } });
      const tabs = this._renderTabs(this._evalView, (v) => { this._evalView = v; this.render(); });

      const btnEval = el('button', { class: 'btn', title: 'Evaluate (Ctrl+Enter)' }, 'Eval');
      const title = el('div', { class: 'sectionTitle' }, el('span', {}, 'Evaluator'), el('div', { style: { display: 'flex', gap: '8px', alignItems: 'center' } }, tabs, btnEval));

        });

              label: '(eval)',

              literals: spec.literals,

            });

            for (const t of (spec.tempNames || [])) {
              if (!vm.hasSlot(methodTemplate, t)) vm.addSlot(methodTemplate, t, vm.nil, { isReadWrite: true });
            }


            const result = vm.invokeMethod(methodTemplate, holderObj, [], { selectorName: '(eval)', holder: holderObj });

            Outliners.open(openVal, { x: parseFloat(this.root.style.left) + 24, y: parseFloat(this.root.style.top) + 52 });
          } catch (e) {

      } else {
        const ta = el('textarea', { spellcheck: 'false' }, String(this._evalBytecode || ''));
        ta.addEventListener('input', () => { this._evalBytecode = ta.value; });
        ta.addEventListener('keydown', (ev) => {
          if ((ev.ctrlKey || ev.metaKey) && ev.key === 'Enter') { ev.preventDefault(); btnEval.click(); }
        });
        btnEval.addEventListener('click', () => {
          try {
            const methodTemplate = vm.newMethodTemplate({
              label: '(eval)',
              selectorHint: '(eval)',
              argNames: [],
              literals: this._evalLiterals || [],
              bytecode: ta.value
            });
            const result = vm.invokeMethod(methodTemplate, holderObj, [], { selectorName: '(eval)', holder: holderObj });
            const openVal = (result && typeof result === 'object') ? result : boxPrimitiveResult(result, '(eval result)');
            Outliners.open(openVal, { x: parseFloat(this.root.style.left) + 24, y: parseFloat(this.root.style.top) + 52 });
          } catch (e) {
            const msg = e instanceof Error ? e.message : String(e);
            toast(`Eval error: ${msg}`, 'error');
          if (e instanceof VMError) openErrorReport(e);
          }
        });
        wrap.appendChild(ta);
      }

      return wrap;
    }

    

    _renderIndexedSection(holderObj) {
      const wrap = el('div', {});
      const list = el('div', { class: 'slotList' });
      const slots = Array.isArray(holderObj.indexedSlots) ? holderObj.indexedSlots : [];
      for (let i = 0; i < slots.length; i++) {
        list.appendChild(this._renderIndexedRow(holderObj, i, slots[i]));
      }

      const btnAdd = el('button', { class: 'smallBtn', title: 'Add indexed slots' }, '+');
      btnAdd.addEventListener('click', () => {
        const txt = prompt('Add how many indexed slots?', '1');
        if (txt == null) return;
        const n = Math.max(0, Math.floor(Number(txt)));
        if (!Number.isFinite(n)) return;
        vm._tryPrimitiveSend(holderObj, 'indexedAdd', [vm.makeNumber(n)]);
        this.render();
      });

      const btnDel = el('button', { class: 'smallBtn danger', title: 'Delete indexed slot range' }, 'Del');
      btnDel.addEventListener('click', () => {
        const txt = prompt('Delete range (from,to) 1-based:', '');
        if (txt == null) return;
        const m = String(txt).split(/\s*,\s*/);
        if (m.length < 2) return;
        const from = Math.floor(Number(m[0]));
        const to = Math.floor(Number(m[1]));
        if (!Number.isFinite(from) || !Number.isFinite(to)) return;
        const arr = Array.isArray(holderObj.indexedSlots) ? holderObj.indexedSlots : [];
        const rem = arr.slice(Math.max(0, from - 1), Math.min(arr.length, to)).map(e => e && e.id);
        for (const id of rem) {
          if (id != null) Links.remove(holderObj.id, `idx:${id}`);
        }
        vm._tryPrimitiveSend(holderObj, 'indexedDeleteRange', [vm.makeNumber(from), vm.makeNumber(to)]);
        this.render();
      });

      const title = el('div', { class: 'sectionTitle', style: { marginTop: '10px' } },
        el('span', {}, 'Indexed'),
        el('div', { style: { display: 'flex', gap: '6px' } }, btnAdd, btnDel)
      );

      wrap.append(title, list);
      return wrap;
    }

    _renderIndexedRow(holderObj, index, entry) {
      const displayIndex = index + 1;
      const stableKey = entry && entry.id != null ? `idx:${entry.id}` : `idx:pos:${displayIndex}`;
      const curValue = entry && typeof entry === 'object' && 'value' in entry ? entry.value : entry;

      const row = el('div', { class: 'slotRow', dataset: { slotName: stableKey } });
      const stripe = el('div', { class: 'slotStripe', dataset: { kind: 'indexed' }, title: 'indexed' });

      row.dataset.controls = 'closed';
      const toggleBtn = el('button', { class: 'slotToggle', title: 'Show/hide slot controls' }, '▾');
      toggleBtn.addEventListener('click', (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        const open = row.dataset.controls === 'open';
        row.dataset.controls = open ? 'closed' : 'open';
        toggleBtn.textContent = open ? '▾' : '▴';
      });

      const nameEl = el('div', { class: 'slotName', contenteditable: 'false' }, String(displayIndex));

      const valueWrap = el('div', { class: 'slotValue' });
      const valueChip = el('div', { class: 'slotValueChip', contenteditable: 'true', spellcheck: 'false' }, safeDescribe(curValue));

      valueChip.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter') { ev.preventDefault(); valueChip.blur(); }
      });

      valueChip.addEventListener('blur', () => {
        const parsed = parseValueText(valueChip.textContent);
        if (!parsed.ok) { toast(parsed.error, 'error'); valueChip.textContent = safeDescribe(curValue); return; }
        vm._tryPrimitiveSend(holderObj, 'indexedAtPut', [vm.makeNumber(displayIndex), parsed.value]);
        if (entry && typeof entry === 'object' && 'value' in entry) entry.value = parsed.value;
        valueChip.textContent = safeDescribe(parsed.value);
        if (parsed.value && typeof parsed.value === 'object' && typeof parsed.value.id === 'number') Links.setTarget(holderObj.id, stableKey, parsed.value.id);
        else Links.setTarget(holderObj.id, stableKey, NaN);
        Links.schedule();
      });

      const wireDrop = (node) => {
        node.addEventListener('dragover', (ev) => {
          const dt = ev.dataTransfer;
          if (dt.types.includes(DND.MIME_OBJ) || dt.types.includes(DND.MIME_SLOT_REF)) {
            ev.preventDefault();
            dt.dropEffect = 'link';
            node.classList.add('dropTarget');
          }
        });
        node.addEventListener('dragleave', () => node.classList.remove('dropTarget'));
        node.addEventListener('drop', (ev) => {
          const dt = ev.dataTransfer;
          const obj = DND.getObject(dt.getData(DND.MIME_OBJ));
          const slotRef = DND.getSlotRef(dt.getData(DND.MIME_SLOT_REF));
          node.classList.remove('dropTarget');
          if (obj) {
            ev.preventDefault();
            vm._tryPrimitiveSend(holderObj, 'indexedAtPut', [vm.makeNumber(displayIndex), obj]);
            if (entry && typeof entry === 'object' && 'value' in entry) entry.value = obj;
            valueChip.textContent = safeDescribe(obj);
            Links.setTarget(holderObj.id, stableKey, obj.id);
            Links.setVisible(holderObj.id, stableKey, true);
            Links.schedule();
            return;
          }
          if (slotRef) {
            const target = (entry && typeof entry === 'object' && 'value' in entry) ? entry.value : curValue;
            if (target && typeof target === 'object') {
              ev.preventDefault();
              retargetSlot(slotRef.srcObj, slotRef.slotName, target);
            }
          }
        });
      };
      wireDrop(valueChip);

      valueWrap.appendChild(valueChip);

      const actions = el('div', { class: 'slotActions' });
      const btnDel = el('button', { class: 'smallBtn danger', title: 'Delete this indexed slot' }, 'Del');
      btnDel.addEventListener('click', () => {
        if (entry && entry.id != null) Links.remove(holderObj.id, `idx:${entry.id}`);
        vm._tryPrimitiveSend(holderObj, 'indexedDeleteRange', [vm.makeNumber(displayIndex), vm.makeNumber(displayIndex)]);
        this.render();
      });
      actions.appendChild(btnDel);

      const handle = el('div', { class: 'grip', draggable: 'true', title: 'Click: open referenced object / toggle line. Drag: retarget reference.' }, '::');
      Links.bindFromEl(holderObj.id, stableKey, handle);

      handle.addEventListener('dragstart', (ev) => {
        DND.setSlotRef(ev.dataTransfer, holderObj, stableKey);
        ev.dataTransfer.effectAllowed = 'link';
      });

      handle.addEventListener('click', () => {
        const v = (entry && typeof entry === 'object' && 'value' in entry) ? entry.value : curValue;
        if (!v || typeof v !== 'object') return;
        const wasOpen = Outliners.windows.has(identityKey(v));
        Outliners.open(v, { x: parseFloat(this.root.style.left) + 24, y: parseFloat(this.root.style.top) + 52 });
        if (wasOpen) Links.toggleVisible(holderObj.id, stableKey);
        else Links.setVisible(holderObj.id, stableKey, true);
        if (v && typeof v === 'object' && typeof v.id === 'number') Links.setTarget(holderObj.id, stableKey, v.id);
        Links.schedule();
      });

      const top = el('div', { class: 'slotTop' }, toggleBtn, nameEl, valueWrap, handle);
      const bottom = el('div', { class: 'slotBottom' }, actions);

      row.append(stripe, top, bottom);
      return row;
    }

_renderSlotRow(holderObj, slot) {
      const slotName = slot.name;
      const row = el('div', { class: 'slotRow', dataset: { slotName } });

      const stripeKind = (() => {
        if (slotName === '(lexicalParent)') return 'lexical';
        if (slot.isLiteral && slot.literalKind === 'block') return 'literalBlock';
        if (slot.isLiteral) return 'literal';
        if (slot.isParent) return 'parent';
        if (slot.isArgument) return 'arg';
        if (slot.isReadWrite) return 'rw';
        if (slot.value && typeof slot.value === 'object' && slot.value.kind === 'methodTemplate') return 'method';
        return 'data';
      })();

      const stripe = el('div', { class: 'slotStripe', dataset: { kind: stripeKind }, title: stripeKind });

      const nameEl = el('div', { class: 'slotName', contenteditable: 'true', spellcheck: 'false' }, slotName);
      nameEl.addEventListener('blur', () => {
        const newName = nameEl.textContent.trim();
        if (!newName || newName === slotName) { nameEl.textContent = slotName; return; }
        if (vm.hasSlot(holderObj, newName)) { toast(`Slot '${newName}' already exists.`, 'error'); nameEl.textContent = slotName; return; }

        holderObj.slots[newName] = Object.assign({}, holderObj.slots[slotName], { name: newName });
        delete holderObj.slots[slotName];

        const oldKey = Links.key(holderObj.id, slotName);
        const e = Links.entries.get(oldKey);
        if (e) {
          Links.entries.delete(oldKey);
          e.slotName = newName;
          Links.entries.set(Links.key(holderObj.id, newName), e);
        }

        this.render();
      });

      const valueWrap = el('div', { class: 'slotValue' });
      const valueChip = el('div', { class: 'slotValueChip', contenteditable: 'true', spellcheck: 'false' }, safeDescribe(slot.value));

      valueChip.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter') { ev.preventDefault(); valueChip.blur(); }
      });

      valueChip.addEventListener('blur', () => {
        const parsed = parseValueText(valueChip.textContent);
        if (!parsed.ok) {
          toast(parsed.error, 'error');
          valueChip.textContent = safeDescribe(slot.value);
          return;
        }
        slot.value = parsed.value;
        valueChip.textContent = safeDescribe(slot.value);
        if (slot.value && typeof slot.value === 'object' && typeof slot.value.id === 'number') {
          Links.setTarget(holderObj.id, slotName, slot.value.id);
        } else {
          Links.setTarget(holderObj.id, slotName, NaN);
        }
        Links.schedule();
      });

      // Drop: set slot value (object badge), or retarget another slot to this slot's current value.
      valueChip.addEventListener('dragover', (ev) => {
        const dt = ev.dataTransfer;
        if (dt.types.includes(DND.MIME_OBJ) || dt.types.includes(DND.MIME_SLOT_REF)) {
          ev.preventDefault();
          dt.dropEffect = 'link';
          valueChip.classList.add('dropTarget');
        }
      });
      valueChip.addEventListener('dragleave', () => valueChip.classList.remove('dropTarget'));
      valueChip.addEventListener('drop', (ev) => {
        const dt = ev.dataTransfer;
        const obj = DND.getObject(dt.getData(DND.MIME_OBJ));
        const slotRef = DND.getSlotRef(dt.getData(DND.MIME_SLOT_REF));
        valueChip.classList.remove('dropTarget');

        if (obj) {
          ev.preventDefault();
          slot.value = obj;
          valueChip.textContent = safeDescribe(slot.value);
          Links.setTarget(holderObj.id, slotName, obj.id);
          Links.setVisible(holderObj.id, slotName, true);
          Links.schedule();
          return;
        }

        if (slotRef) {
          const target = slot.value;
          if (target && typeof target === 'object') {
            ev.preventDefault();
            retargetSlot(slotRef.srcObj, slotRef.slotName, target);
          }
        }
      });

      valueWrap.appendChild(valueChip);

      const flags = el('div', { class: 'slotFlags' },
        el('label', { class: 'flag' }, el('input', { type: 'checkbox', checked: slot.isParent ? 'checked' : null }), 'parent'),
        el('label', { class: 'flag' }, el('input', { type: 'checkbox', checked: slot.isArgument ? 'checked' : null }), 'arg'),
        el('label', { class: 'flag' }, el('input', { type: 'checkbox', checked: slot.isLiteral ? 'checked' : null }), 'lit'),
        el('label', { class: 'flag', title: 'Read/write slot' }, el('input', { type: 'checkbox', checked: slot.isReadWrite ? 'checked' : null }), 'rw')
      );
      const flagInputs = flags.querySelectorAll('input');
      flagInputs[0].addEventListener('change', () => { slot.isParent = flagInputs[0].checked; });
      flagInputs[1].addEventListener('change', () => { slot.isArgument = flagInputs[1].checked; });
      flagInputs[2].addEventListener('change', () => { slot.isLiteral = flagInputs[2].checked; });
      flagInputs[3].addEventListener('change', () => { slot.isReadWrite = !!flagInputs[3].checked; });

      const actions = el('div', { class: 'slotActions' });

      if (slot.value && typeof slot.value === 'object' && slot.value.kind === 'methodTemplate') {
        const btnExec = el('button', { class: 'smallBtn', title: 'Execute method and open result' }, 'Exec');
        btnExec.addEventListener('click', () => {
          try {
            const mt = slot.value;
            const args = [];
            for (const argName of (mt.argNames || [])) {
              const input = prompt(`Argument '${argName}':`, '');
              if (input == null) return;
              const parsed = parseValueText(input);
              if (!parsed.ok) { toast(parsed.error, 'error'); return; }
              args.push(parsed.value);
            }
            const result = vm.send(holderObj, slotName, args);
            const openVal = (result && typeof result === 'object') ? result : boxPrimitiveResult(result, '(result)');
            Outliners.open(openVal, { x: parseFloat(this.root.style.left) + 24, y: parseFloat(this.root.style.top) + 52 });
          } catch (e) {
            toast(e instanceof Error ? e.message : String(e), 'error');
          if (e instanceof VMError) openErrorReport(e);
          }
        });
        actions.appendChild(btnExec);
      }

      const btnDel = el('button', { class: 'smallBtn danger' }, 'Del');
      btnDel.addEventListener('click', () => {
        if (!confirm(`Delete slot '${slotName}'?`)) return;
        delete holderObj.slots[slotName];
        Links.remove(holderObj.id, slotName);
        this.render();
      });
      actions.appendChild(btnDel);



      const resolveInspectableTarget = () => {
        // In this demo VM, literal block slots store a *template* (blockLiteralTemplate).
        // A real closure object (blockInstance) is only created when the slot is *resolved* for a send,
        // because it needs the current activation as lexical parent.
        if (slot.isLiteral && slot.literalKind === 'block' && slot.value && typeof slot.value === 'object' && slot.value.kind === 'blockLiteralTemplate') {

      const btnFileExport = $('#btnFileExport');

      if (btnFileSave) btnFileSave.addEventListener('click', () => this.saveActive());
      if (btnFileRevert) btnFileRevert.addEventListener('click', () => this.loadActive());
      if (btnFileExport) btnFileExport.addEventListener('click', () => this.exportActive());

      this.refreshList();
      // Default view is a small, editable file (avoids generating full HTML on tab switch).
      this.selectByName('selfie_help.js', false);
    },

    refreshList() {
      const list = $('#vmList');
      if (!list) return;

      const real = listFileElements().map(f => ({ ...f, isPseudo: false }));
      const pseudo = [{ kind: 'html', name: 'Selfie.html', isPseudo: true }];

      this.files = pseudo.concat(real);

      list.innerHTML = '';
      for (const f of this.files) {
        const item = document.createElement('div');
        item.className = 'vmItem';
        item.dataset.active = (this.active && this.active.name === f.name && (!!this.active.isPseudo) === (!!f.isPseudo)) ? 'true' : 'false';

        const name = document.createElement('div');
        name.className = 'vmItem__name';
        name.textContent = f.name;

        const badge = document.createElement('span');
        badge.className = 'vmBadge';
        badge.textContent = f.kind;

        const actions = document.createElement('div');
        actions.className = 'vmItem__actions';

        actions.appendChild(badge);

        const mkBtn = (title, text, onClick) => {
          const b = document.createElement('button');
          b.className = 'vmIconBtn';
          b.type = 'button';
          b.title = title;
          b.textContent = text;
          b.addEventListener('click', (ev) => { ev.stopPropagation(); onClick(); });
          return b;
        };

        if (!f.isPseudo) {
          actions.appendChild(mkBtn('Rename', '✎', () => this.renameFile(f)));
          actions.appendChild(mkBtn('Export', '⭳', () => downloadText(f.el.textContent || '', f.name)));
          actions.appendChild(mkBtn('Delete', '🗑', () => this.deleteFile(f)));
        } else {
          actions.appendChild(mkBtn('Export HTML', '⭳', () => this.exportActive()));
        }

        item.appendChild(name);
        item.appendChild(actions);

        item.addEventListener('click', () => this.selectFile(f));

        list.appendChild(item);
      }
    },

    selectByName(name, isPseudo) {
      const f = this.files.find(x => x.name === name && (!!x.isPseudo) === (!!isPseudo));
      if (f) this.selectFile(f);
    },

    selectFile(f) {
      this.active = f;
      this.refreshList();
      this.loadActive();
    },

    loadActive() {
      const f = this.active;
      const title = $('#vmEditorTitle');
      if (title) title.textContent = f ? f.name : '(none)';

      if (!this.cm) return;

      if (!f) { this.cm.setValue(''); this.cm.setOption('readOnly', true); return; }

      if (f.isPseudo && f.kind === 'html') {
        const html = global.SelfieSave ? global.SelfieSave.buildHtmlString() : '<html><!-- SelfieSave missing --></html>';
        this.cm.setOption('mode', 'htmlmixed');
        this.cm.setValue(html);
        this.cm.setOption('readOnly', true);
        return;
      }

      this.cm.setOption('mode', inferMode(f.name, f.kind));
      this.cm.setValue(f.el.textContent || '');
      this.cm.setOption('readOnly', false);
    },

    saveActive() {
      const f = this.active;
      if (!f || f.isPseudo) return;
      if (!this.cm) return;
      f.el.textContent = this.cm.getValue();
      this.refreshList();
    },

    exportActive() {
      const f = this.active;
      if (!f) return;
      if (f.isPseudo && f.kind === 'html') {
        const html = global.SelfieSave ? global.SelfieSave.buildHtmlString() : '';
        downloadText(html, 'Selfie.html');
        return;
      }
      if (!f.isPseudo) downloadText(f.el.textContent || '', f.name);
    },

    addFile(kind) {
      const name0 = prompt(`New ${kind} name:`, kind === 'script' ? 'new.js' : 'new.css');
      if (!name0) return;
      let name = name0.trim();
      if (!name) return;
      if (kind === 'script' && !name.endsWith('.js')) name += '.js';
      if (kind === 'style' && !name.endsWith('.css')) name += '.css';

      if (listFileElements().some(f => f.name === name)) { alert('File already exists.'); return; }

      if (kind === 'style') {
        const st = document.createElement('style');
        st.dataset.selfieFile = 'true';
        st.dataset.name = name;
        st.textContent = '/* new style */\n';
        document.head.appendChild(st);
      } else {
        const sc = document.createElement('script');
        sc.type = 'application/x-selfie-script';
        sc.dataset.selfieFile = 'true';
        sc.dataset.name = name;
        sc.textContent = `// ${name}
`;
        const boot = document.getElementById('selfie-boot');
        (boot && boot.parentNode ? boot.parentNode : document.body).insertBefore(sc, boot || null);
      }

      this.refreshList();
      this.selectByName(name, false);
    },

    renameFile(f) {
      const newName0 = prompt('Rename to:', f.name);
      if (!newName0) return;
      const newName = newName0.trim();
      if (!newName || newName === f.name) return;
      if (listFileElements().some(x => x.name === newName)) { alert('Name already exists.'); return; }
      f.el.dataset.name = newName;
      this.refreshList();
      this.selectByName(newName, false);
    },

    deleteFile(f) {
      if (!confirm(`Delete ${f.name}?`)) return;
      try { f.el.remove(); } catch {}
      this.active = null;
      this.refreshList();
      this.selectByName('selfie_help.js', false);
    },

    async handleDrop(ev) {
      ev.preventDefault();
      const files = Array.from(ev.dataTransfer.files || []);
      for (const file of files) {
        const name = file.name || '';
        const isJS = /\.js$/i.test(name);
        const isCSS = /\.css$/i.test(name);
        if (!isJS && !isCSS) continue;

        const text = await file.text();
        const existing = listFileElements().find(f => f.name === name);
        if (existing) {
          existing.el.textContent = text;
        } else {
          if (isCSS) {
            const st = document.createElement('style');
            st.dataset.selfieFile = 'true';
            st.dataset.name = name;
            st.textContent = text;
            document.head.appendChild(st);
          } else {
            const sc = document.createElement('script');
            sc.type = 'application/x-selfie-script';
            sc.dataset.selfieFile = 'true';
            sc.dataset.name = name;
            sc.textContent = text;
            const boot = document.getElementById('selfie-boot');
            (boot && boot.parentNode ? boot.parentNode : document.body).insertBefore(sc, boot || null);
          }
        }
      }
      this.refreshList();
    }
  };

  global.SelfieShell = SelfieShell;
})(window);
  </script>

  <!-- Boot (executes the script files above) -->
  <script id="selfie-boot" data-selfie-file="true" data-name="selfie_boot.js">
(function(){
  'use strict';
  function run() {
    const scripts = Array.from(document.querySelectorAll('script[type="application/x-selfie-script"][data-selfie-file="true"]'));
    for (const s of scripts) {
      const name = s.dataset.name || '(script)';
      let code = String(s.textContent || '');
      try {
        // eslint-disable-next-line no-new-func
        code = code.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g, '');
      new Function(code)();
      } catch (e) {
        console.error('Selfie boot error in', name, e);
        alert('Selfie boot error in ' + name + ': ' + (e && e.message ? e.message : e));
        return;
      }
    }
    if (window.SelfieShell && typeof window.SelfieShell.start === 'function') {
      window.SelfieShell.start();
    }
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();
})();
  </script>
</body>
