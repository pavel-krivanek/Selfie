  <style data-selfie-file="true" data-name="outliner.css">

:root {
  /* System theme default: LIGHT. Dark is applied via prefers-color-scheme below.
     You can override with data-theme="dark" / data-theme="light". */

  /* Light theme: background (desktop) is darkest; edit fields are lightest. */
  --bg: #c7ccd6;
  --panel: #dde2ea;
  --panel2: #d4d9e3;
  --stroke: #aeb6c6;
  --text: #0b1220;
  --muted: #2b3550;
  --accent: #1f6feb;
  --accent-rgb: 31,111,235;

  --danger: #d1242f;
  --ok: #1a7f37;

  --field-bg: #f4f6fb; /* lightest (but not white) */
  --slot-bg: #eef2f8;
  --btn2-bg: #edf1f7;
  --toolbar-bg: rgba(199, 204, 214, .92);

  --shadow: 0 10px 28px rgba(0,0,0,.12);

  /* Slot stripe colors (theme-fitting, distinct) */
  --stripe-data: hsla(210, 85%, 45%, .35);
  --stripe-method: hsla(280, 75%, 55%, .35);
  --stripe-rw: hsla(190, 80%, 40%, .35);
  --stripe-parent: hsla(45, 90%, 45%, .35);
  --stripe-arg: hsla(140, 70%, 40%, .35);
  --stripe-literal: hsla(0, 80%, 50%, .35);
  --stripe-literalBlock: hsla(25, 90%, 45%, .35);
  --stripe-lexical: hsla(330, 80%, 50%, .35);

  --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1e1f22;
    --panel: #2b2d31;
    --panel2: #31343a;
    --stroke: #3f434a;
    --text: #e6e6e6;
    --muted: #b2b2b2;
    --accent: #8ab4f8;
    --accent-rgb: 138,180,248;

    --danger: #ff6b6b;
    --ok: #7ee787;

    --field-bg: #17181b;
    --slot-bg: rgba(0,0,0,.12);
    --btn2-bg: #24262b;
    --toolbar-bg: rgba(30,31,34,.92);

    --shadow: 0 12px 40px rgba(0,0,0,.4);

    --stripe-data: hsla(210, 80%, 70%, .35);
    --stripe-method: hsla(280, 80%, 72%, .45);
    --stripe-rw: hsla(190, 80%, 60%, .45);
    --stripe-parent: hsla(45, 90%, 60%, .45);
    --stripe-arg: hsla(140, 70%, 55%, .45);
    --stripe-literal: hsla(0, 80%, 65%, .45);
    --stripe-literalBlock: hsla(25, 90%, 60%, .45);
    --stripe-lexical: hsla(330, 80%, 65%, .45);
  }
}

:root[data-theme="light"] {
  --bg: #c7ccd6;
  --panel: #dde2ea;
  --panel2: #d4d9e3;
  --stroke: #aeb6c6;
  --text: #0b1220;
  --muted: #2b3550;
  --accent: #1f6feb;
  --accent-rgb: 31,111,235;

  --danger: #d1242f;
  --ok: #1a7f37;

  --field-bg: #f4f6fb;
  --slot-bg: #eef2f8;
  --btn2-bg: #edf1f7;
  --toolbar-bg: rgba(199, 204, 214, .92);

  --shadow: 0 10px 28px rgba(0,0,0,.12);

  --stripe-data: hsla(210, 85%, 45%, .35);
  --stripe-method: hsla(280, 75%, 55%, .35);
  --stripe-rw: hsla(190, 80%, 40%, .35);
  --stripe-parent: hsla(45, 90%, 45%, .35);
  --stripe-arg: hsla(140, 70%, 40%, .35);
  --stripe-literal: hsla(0, 80%, 50%, .35);
  --stripe-literalBlock: hsla(25, 90%, 45%, .35);
  --stripe-lexical: hsla(330, 80%, 50%, .35);
}

:root[data-theme="dark"] {
  --bg: #1e1f22;
  --panel: #2b2d31;
  --panel2: #31343a;
  --stroke: #3f434a;
  --text: #e6e6e6;
  --muted: #b2b2b2;
  --accent: #8ab4f8;
  --accent-rgb: 138,180,248;

  --danger: #ff6b6b;
  --ok: #7ee787;

  --field-bg: #17181b;
  --slot-bg: rgba(0,0,0,.12);
  --btn2-bg: #24262b;
  --toolbar-bg: rgba(30,31,34,.92);

  --shadow: 0 12px 40px rgba(0,0,0,.4);

  --stripe-data: hsla(210, 80%, 70%, .35);
  --stripe-method: hsla(280, 80%, 72%, .45);
  --stripe-rw: hsla(190, 80%, 60%, .45);
  --stripe-parent: hsla(45, 90%, 60%, .45);
  --stripe-arg: hsla(140, 70%, 55%, .45);
  --stripe-literal: hsla(0, 80%, 65%, .45);
  --stripe-literalBlock: hsla(25, 90%, 60%, .45);
  --stripe-lexical: hsla(330, 80%, 65%, .45);
}

* { box-sizing: border-box; }

html, body {
  height: 100%;
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
}

.toolbar {
  display: flex;
  gap: 12px;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  border-bottom: 1px solid var(--stroke);
  background: var(--toolbar-bg);
  backdrop-filter: blur(8px);
  position: sticky;
  top: 0;
  z-index: 9999;
}

.toolbar__left { display: flex; gap: 10px; align-items: baseline; }
.toolbar__hint { color: var(--muted); font-size: 12px; }
.toolbar__right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

.toolbar__search {
  width: min(420px, 40vw);
  padding: 7px 10px;
  border: 1px solid var(--stroke);
  background: var(--field-bg);
  color: var(--text);
  border-radius: 8px;
  outline: none;
}
.toolbar__search:focus { border-color: var(--accent); }

.btn {
  padding: 7px 10px;
  border: 1px solid var(--stroke);
  background: var(--panel);
  color: var(--text);
  border-radius: 8px;
  cursor: pointer;
}
.btn:hover { border-color: #5a606a; }
.btn:active { transform: translateY(1px); }

.workspace {
  position: relative;
  height: calc(100% - 54px);
  overflow: hidden;
}

.linkLayer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1000000;
}

.linkLine {
  fill: none;
  stroke: rgba(var(--accent-rgb), .30);
  stroke-width: 2;
  stroke-linecap: round;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,.45));
}

.outliner {
  position: absolute;
  min-width: 300px;
  min-height: 280px;
  width: 450px;
  height: 420px;
  background: var(--panel);
  border: 1px solid var(--stroke);
  border-radius: 10px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  resize: both;
}

.outliner:focus-within { border-color: var(--accent); }

.outliner__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 8px 8px 10px;
  background: linear-gradient(180deg, var(--panel2), var(--panel));
  border-bottom: 1px solid var(--stroke);
  cursor: grab;
  user-select: none;
}
.outliner__header:active { cursor: grabbing; }

.header__title { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.header__titleLine { display: flex; gap: 8px; align-items: baseline; min-width: 0; }

.badge {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  padding: 2px 6px;
  border: 1px solid var(--stroke);
  border-radius: 999px;
  background: rgba(0,0,0,.2);
}

.objLabel {
  font-family: var(--mono);
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.objLabel[contenteditable="true"] { outline: none; border-radius: 6px; padding: 2px 4px; }
.objLabel[contenteditable="true"]:focus { background: rgba(138,180,248,.12); }

.header__kind { font-size: 12px; color: var(--muted); }

.header__actions { display: flex; gap: 4px; align-items: center; }

.iconBtn {
  padding: 5px 8px;
  font-size: 12px;
  border: 1px solid var(--stroke);
  background: var(--btn2-bg);
  color: var(--text);
  border-radius: 8px;
  cursor: pointer;
}
.iconBtn:hover { border-color: #5a606a; }
.iconBtn.danger { border-color: rgba(255,107,107,.5); color: var(--danger); }

.outliner__body {
  flex: 1;
  overflow: auto;
  padding: 6px;
}

.sectionTitle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: var(--muted);
  font-size: 12px;
  font-family: var(--mono);
  margin: 2px 0 4px;
}

.slotList { display: flex; flex-direction: column; gap: 4px; }

.slotRow {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 5px 6px 6px 12px;
  border: 1px solid var(--stroke);
  border-radius: 8px;
  background: var(--slot-bg);
}

.slotTop {
  display: grid;
  grid-template-columns: 18px minmax(110px, 1.1fr) minmax(200px, 2fr) 18px;
  gap: 8px;
  align-items: center;
  min-width: 0;
}

.slotBottom {
  display: none;
  gap: 10px;
  align-items: center;
  justify-content: space-between;
  padding-left: 0;
}

.slotRow[data-controls="open"] .slotBottom {
  display: flex;
}

.slotStripe {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 6px;
  border-radius: 8px 0 0 8px;
  background: var(--stripe-data);
}
.slotStripe[data-kind="data"] { background: var(--stripe-data); }
.slotStripe[data-kind="method"] { background: var(--stripe-method); }
.slotStripe[data-kind="rw"] { background: var(--stripe-rw); }
.slotStripe[data-kind="parent"] { background: var(--stripe-parent); }
.slotStripe[data-kind="arg"] { background: var(--stripe-arg); }
.slotStripe[data-kind="literal"] { background: var(--stripe-literal); }
.slotStripe[data-kind="literalBlock"] { background: var(--stripe-literalBlock); }
.slotStripe[data-kind="lexical"] { background: var(--stripe-lexical); }


.slotName {
  font-family: var(--mono);
  font-size: 12px;
  padding: 2px 4px;
  border-radius: 6px;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.slotName[contenteditable="true"]:focus { background: rgba(138,180,248,.12); outline: none; }

.slotValue { min-width: 0; display: flex; align-items: center; gap: 8px; }

.slotValueChip {
  flex: 1;
  min-width: 0;
  padding: 3px 6px;
  border: 1px solid var(--stroke);
  border-radius: 999px;
  background: var(--field-bg);
  font-family: var(--mono);
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.slotValueChip[contenteditable="true"] { cursor: text; border-radius: 8px; }
.slotValueChip[contenteditable="true"]:focus { outline: none; background: rgba(138,180,248,.12); }

.slotFlags { display: flex; gap: 4px; align-items: center; justify-content: flex-end; }

.flag { display: inline-flex; gap: 4px; align-items: center; font-size: 11px; color: var(--muted); font-family: var(--mono); }
.flag input { accent-color: var(--accent); }

.slotActions { display: flex; gap: 4px; justify-content: flex-end; }

.smallBtn {
  padding: 3px 7px;
  border: 1px solid var(--stroke);
  background: var(--btn2-bg);
  color: var(--text);
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
}
.smallBtn:hover { border-color: #5a606a; }
.smallBtn.danger { color: var(--danger); border-color: rgba(255,107,107,.45); }

.grip {
  width: 16px;
  height: 16px;
  display: grid;
  place-items: center;
  border: 1px solid var(--stroke);
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  background: rgba(0,0,0,.2);
  cursor: pointer;
  user-select: none;
}

.grip[data-active="true"] {
  border-color: var(--accent);
  color: var(--text);
  background: rgba(138,180,248,.15);
}

.kv {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 8px;
  padding: 6px;
  border: 1px solid var(--stroke);
  border-radius: 8px;
  background: var(--slot-bg);
  margin-bottom: 8px;
}
.kv__k { font-family: var(--mono); font-size: 12px; color: var(--muted); }
.kv__v { font-family: var(--mono); font-size: 12px; }

.codeTabs {
  display: inline-flex;
  gap: 4px;
  align-items: center;
}

.tabBtn {
  padding: 4px 8px;
  border: 1px solid var(--stroke);
  background: rgba(0,0,0,.18);
  color: var(--text);
  border-radius: 999px;
  font-size: 12px;
  cursor: pointer;
  font-family: var(--mono);
}
.tabBtn[data-active="true"] { border-color: var(--accent); background: rgba(138,180,248,.12); }

.codeArea {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.codeArea textarea {
  width: 100%;
  min-height: 140px;
  resize: vertical;
  border: 1px solid var(--stroke);
  background: var(--field-bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px;
  border-radius: 8px;
  outline: none;
}
.codeArea textarea:focus { border-color: var(--accent); }

.headerLine {
  display: flex;
  gap: 8px;
  align-items: center;
}

.headerInput {
  flex: 1;
  padding: 6px 8px;
  border: 1px solid var(--stroke);
  background: var(--field-bg);
  color: var(--text);
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 12px;
  outline: none;
}
.headerInput:focus { border-color: var(--accent); }

.evalHint {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  line-height: 1.3;
}

.toast {
  position: fixed;
  left: 12px;
  bottom: 12px;
  background: rgba(0,0,0,.65);
  border: 1px solid var(--stroke);
  padding: 10px 12px;
  border-radius: 10px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  opacity: 0;
  pointer-events: none;
  transition: opacity .18s ease;
  max-width: min(680px, calc(100vw - 24px));
  z-index: 1000001;
}
.toast.show { opacity: 1; }

.dropTarget {
  outline: 2px dashed rgba(138,180,248,.8);
  outline-offset: 2px;
}


.slotToggle{
  width: 18px;
  height: 18px;
  padding: 0;
  border: 1px solid var(--stroke);
  background: rgba(0,0,0,.18);
  color: var(--muted);
  border-radius: 6px;
  cursor: pointer;
  line-height: 16px;
  font-size: 12px;
}
.slotToggle:hover{ border-color:#5a606a; }

  

.helpDoc{
  padding: 10px;
  border: 1px solid var(--stroke);
  border-radius: 10px;
  background: var(--field-bg);
  color: var(--text);
  font-family: var(--sans);
}
.helpDoc h1, .helpDoc h2, .helpDoc h3{
  font-family: var(--sans);
  margin: 10px 0 6px;
}
.helpDoc h1{ font-size: 18px; }
.helpDoc h2{ font-size: 14px; color: var(--muted); }
.helpDoc ul{ margin: 6px 0 10px 18px; }
.helpDoc code{ font-family: var(--mono); background: rgba(0,0,0,.08); padding: 1px 4px; border-radius: 6px; }
@media (prefers-color-scheme: dark){
  .helpDoc code{ background: rgba(255,255,255,.08); }
}
</style>

  <style data-selfie-file="true" data-name="selfie_shell.css">

/* Image view sizing (workspace is nested inside #imagePane) */
#imagePane {
  height: calc(100vh - 54px);
  display: block;
}
#imagePane .workspace {
  height: 100%;
}
/* Selfie VM view (file editor) */
.vmRoot {
  height: calc(100vh - 54px);
  display: none;
}

.vmRoot[aria-hidden="false"] { display: grid; grid-template-columns: 320px 1fr; }

.vmSidebar {
  border-right: 1px solid var(--stroke);
  background: rgba(0,0,0,.04);
  display: flex;
  flex-direction: column;
  min-width: 260px;
}

.vmSidebar__toolbar {
  padding: 10px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--stroke);
}

.vmList {
  flex: 1;
  overflow: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.vmItem {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: center;
  padding: 8px 8px;
  border: 1px solid var(--stroke);
  border-radius: 10px;
  background: rgba(0,0,0,.06);
  cursor: pointer;
}

.vmItem[data-active="true"] {
  border-color: var(--accent);
  background: rgba(31,111,235,.10);
}

.vmItem__name {
  font-family: var(--mono);
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.vmBadge {
  font-family: var(--mono);
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 999px;
  border: 1px solid var(--stroke);
  color: var(--muted);
  background: rgba(0,0,0,.10);
}

.vmEditor {
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.vmEditor__toolbar {
  padding: 10px;
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--stroke);
  background: rgba(0,0,0,.02);
}

.vmEditor__title {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.vmEditor__actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.vmEditor__body {
  flex: 1;
  overflow: hidden;
  padding: 10px;
}

#fileEditor {
  width: 100%;
  height: 100%;
}

.CodeMirror {
  height: 100% !important;
  border: 1px solid var(--stroke);
  border-radius: 12px;
  overflow: hidden;
  font-family: var(--mono);
  font-size: 12px;
}

/* view switch buttons */
.viewSwitch {
  display: inline-flex;
  gap: 6px;
  margin-left: 10px;
}
.viewSwitch .btn[aria-pressed="true"] {
  border-color: var(--accent);
  background: rgba(31,111,235,.12);
}
  

.vmItem__actions{
  display:flex;
  gap:6px;
  align-items:center;
  justify-content:flex-end;
}

.vmIconBtn{
  width: 28px;
  height: 24px;
  padding: 0;
  border: 1px solid var(--stroke);
  background: rgba(0,0,0,.10);
  color: var(--text);
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  line-height: 22px;
}
.vmIconBtn:hover{ border-color: var(--accent); }
</style>
</head>
<body>
  <div id="toolbar" class="toolbar">
    <div class="toolbar__left">
      <strong>Selfie</strong>
      <div class="viewSwitch" role="group" aria-label="View switch">
        <button id="btnViewImage" class="btn" aria-pressed="true">Image</button>
        <button id="btnViewVM" class="btn" aria-pressed="false">VM</button>
      </div>
    </div>
    <div class="toolbar__right">
      <input id="search" class="toolbar__search" type="search" placeholder="Find object by label or id (e.g. lobby, #3)" />
      <button id="btnOpenLobby" class="btn">Open lobby</button>
      <button id="btnOpenGlobals" class="btn">Open globals</button>
      <button id="btnOpenDemos" class="btn">Open demos</button>
      <button id="btnNewObject" class="btn">New object</button>
      <button id="btnSaveImage" class="btn">Save image</button>
      <button id="btnSaveSystem" class="btn">Save system</button>
      <button id="btnHelpTop" class="btn">Help</button>
      <button id="btnToggleLines" class="btn">Hide lines</button>
      <button id="btnTheme" class="btn">Theme: system</button>
    </div>
  </div>

  <div id="imagePane">
    <div id="workspace" class="workspace" aria-label="Outliner workspace"></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </div>

        currentActivation: null,
        activationStack: []

    _bootstrapLobby() {

      this.addSlot(lobby, 'globals', globals, { isParent: true });

      const traitsBlock = this.newObject('traits.block');

      this.addSlot(traitsObject, 'nil', this.nil);

      this.addSlot(this.nil, 'parent', traitsObject, { isParent: true });

      _nilStr.jsValue = 'nil';

        label: 'nil.printString',
        selectorHint: 'printString',
        argNames: [],

      this.addSlot(this.nil, 'printString', _nilPrint);
      this.addSlot(traits, 'block', traitsBlock);
      this.addSlot(traits, 'number', traitsNumber);
      this.addSlot(traits, 'prototype', traitsPrototype);

      // Basic inheritance shape for demo objects.
      this.addSlot(traitsBlock, 'parent', traitsObject, { isParent: true });
      this.addSlot(traitsNumber, 'parent', traitsObject, { isParent: true });
      this.addSlot(traitsPrototype, 'parent', traitsObject, { isParent: true });

      // A generic clone primitive message can be served by the VM; this slot is present only for readability.
      
const makePrimitiveMethod = (selectorName, argNames) => {
  const argc = argNames.length;
  const parts = [];
  // primitiveSend expects: receiver on top, args below.
  // So push args first, then push receiver (self) last.
  for (const a of argNames) {
    parts.push('pushSelf');
    parts.push(`send ${a}`);
  }
  parts.push('pushSelf');
  parts.push('send self');
  parts.push(`primitiveSend ${selectorName} ${argc}`);
  parts.push('returnTop');
  return this.newMethodTemplate({
    label: `primitive ${selectorName}`,
    selectorHint: selectorName,
    argNames,
    bytecode: parts.join('\n')
  });
};

const makePrimitiveWrapperMethod = (methodSelector, primitiveSelector, argNames) => {
  const argc = argNames.length;
  const parts = [];
  // primitiveSend expects: receiver on top, args below.
  for (const a of argNames) {
    parts.push('pushSelf');
    parts.push(`send ${a}`);
  }
  parts.push('pushSelf');
  parts.push('send self');
  parts.push(`primitiveSend ${primitiveSelector} ${argc}`);
  parts.push('returnTop');
  return this.newMethodTemplate({
    label: `primitive ${methodSelector}`,
    selectorHint: methodSelector,
    argNames,
    bytecode: parts.join('\n')
  });
};

// Primitives are expressed as normal methods whose bodies use primitiveSend.
this.addSlot(traitsObject, 'clone', makePrimitiveMethod('clone', []));
this.addSlot(traitsObject, '==', makePrimitiveMethod('==', ['arg']));
this.addSlot(traitsObject, 'setSlot:To:', makePrimitiveMethod('setSlot:To:', ['name', 'value']));

this.addSlot(traitsNumber, '+', makePrimitiveMethod('+', ['arg']));
this.addSlot(traitsNumber, '-', makePrimitiveMethod('-', ['arg']));
this.addSlot(traitsNumber, '*', makePrimitiveMethod('*', ['arg']));
this.addSlot(traitsNumber, '/', makePrimitiveMethod('/', ['arg']));
this.addSlot(traitsNumber, 'printString', makePrimitiveMethod('printString', []));

// Block invocation is expressed as normal methods (no special send handling).
this.addSlot(traitsBlock, 'value', makePrimitiveWrapperMethod('value', 'blockValue', []));
this.addSlot(traitsBlock, 'value:', makePrimitiveWrapperMethod('value:', 'blockValue', ['arg']));
this.addSlot(traitsBlock, 'value:With:', makePrimitiveWrapperMethod('value:With:', 'blockValue', ['arg1', 'arg2']));
this.addSlot(traitsBlock, 'value:With:With:', makePrimitiveWrapperMethod('value:With:With:', 'blockValue', ['arg1', 'arg2', 'arg3']));
this.addSlot(traitsBlock, 'value:With:With:With:', makePrimitiveWrapperMethod('value:With:With:With:', 'blockValue', ['arg1', 'arg2', 'arg3', 'arg4']));


      return lobby;
    }

      return this._systemContext;
    }

    intern(name) {

    }

    newObject(label) {
      const obj = {
        kind: 'object',
        id: this._nextId++,
        label: label || null,
        slots: Object.create(null)

      return obj;
    }

    makeNumber(value) {

      }

      num.kind = 'number';
      num.jsValue = value;
      this.addSlot(num, 'parent', this.getSlotValue(this.getSlotValue(this.lobby, 'traits'), 'number'), { isParent: true });
      return num;
    }

    isNumberObject(obj) {
      return !!obj && typeof obj === 'object' && obj.kind === 'number';
    }

    unwrapNumber(obj) {
      if (!this.isNumberObject(obj)) {
        throw new VMError('Expected a number object.', { actual: this.describeValue(obj) });
      }
      return obj.jsValue;
    }

    describeValue(value) {
      if (value == null) return String(value);
      if (value.kind === 'number') return `Number(${value.jsValue})`;
      if (value.kind === 'methodTemplate') return `<method ${value.label || value.selectorHint || ''}>`;
      if (value.kind === 'blockLiteralTemplate') return `<block literal ${value.label || ''}>`;
      if (value.kind === 'blockInstance') return `<block ${value.label || ''}>`;
      if (value.kind === 'symbol') return `#${value.name}`;
      if (value.kind === 'systemContext') return '<systemContext>';
      if (value.kind === 'object') return `<object ${value.label || '#' + value.id}>`;
      if (typeof value === 'object' && value.selector) return `<${value.kind || 'primitive'} ${value.selector}>`;
      return String(value);
    }

    addSlot(obj, name, value, opts) {
      const options = Object.assign({
        isParent: false,
        isArgument: false,
        isLiteral: false,
        literalKind: null
      }, opts || {});
      obj.slots[name] = {
        name,
        value,
        isParent: !!options.isParent,
        isArgument: !!options.isArgument,
        isLiteral: !!options.isLiteral,
        literalKind: options.literalKind

      return obj;
    }

    hasSlot(obj, name) {
      return !!(obj && obj.slots && Object.prototype.hasOwnProperty.call(obj.slots, name));
    }

    getSlot(obj, name) {
      return this.hasSlot(obj, name) ? obj.slots[name] : null;

    getSlotValue(obj, name) {

      if (!slot) throw new VMError(`Slot '${name}' not found in ${this.describeValue(obj)}.`);

    }

    cloneObjectShallow(original, label) {
      const clone = this.newObject(label || (original.label ? `${original.label} (clone)` : null));
      clone.kind = original.kind;
      if (original.kind === 'number') {
        clone.kind = 'number';
        clone.jsValue = original.jsValue;
      }
      for (const slotName of Object.keys(original.slots)) {

        this.addSlot(clone, slotName, s.value, {
          isParent: s.isParent,
          isArgument: s.isArgument,
          isLiteral: s.isLiteral,
          literalKind: s.literalKind

    }

    compileBytecode(bytecode) {
      const lines = String(bytecode || '')
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter((line) => line.length > 0 && !line.startsWith('//') && !line.startsWith('#'));

      const instructions = [];
      for (const line of lines) {
        const parts = line.split(/\s+/);
        const op = parts[0];
        if (op === 'pushSelf' || op === 'pop' || op === 'returnTop' || op === 'dup') {
          instructions.push({ op, source: line });
          continue;
        }
        if (op === 'send' || op === 'resend' || op === 'primitiveSend' || op === 'primitiveResend') {
          if (parts.length < 2) throw new VMError(`Missing selector in instruction '${line}'.`);
          const selectorText = parts[1];
          const argc = parts.length >= 3 ? Number(parts[2]) : this._inferArity(selectorText);
          if (!Number.isInteger(argc) || argc < 0) {

            op,
            selector: this.intern(selectorText),
            argc,
            source: line

          continue;

        throw new VMError(`Unsupported bytecode instruction '${line}'.`);

      return instructions;
    }

    _inferArity(selectorText) {
      const colons = (selectorText.match(/:/g) || []).length;
      if (colons > 0) return colons;
      // In examples we pass explicit arity for binary selectors to avoid ambiguity.
      return 0;
    }

    newMethodTemplate(spec) {
      const cfg = Object.assign({
        label: null,
        argNames: [],
        source: '',
        bytecode: '',
        literals: [],
        activationParentSlotName: 'self',
        activationParentIsSelf: true,
        selectorHint: null
      }, spec || {});

      const method = this.newObject(cfg.label || 'method');
      method.kind = 'methodTemplate';
      method.selectorHint = cfg.selectorHint || null;
      method.source = String(cfg.source || '');
      method.bytecode = String(cfg.bytecode || '');
      method.instructions = this.compileBytecode(method.bytecode);
      method.argNames = cfg.argNames.slice();
      method.activationParentSlotName = cfg.activationParentSlotName;
      method.activationParentIsSelf = !!cfg.activationParentIsSelf;

      // Parent slot of the future activation object.
      this.addSlot(method, cfg.activationParentSlotName, this.nil, { isParent: true, isArgument: true });

        label: null,
        valueSelector: 'value',
        argNames: [],
        source: '',
        bytecode: '',
        literals: []
      }, spec || {});

        label: `${cfg.label || 'block'}::method`,
        argNames: cfg.argNames,
        source: cfg.source,
        bytecode: cfg.bytecode,
        literals: cfg.literals,
        activationParentSlotName: '(parent)',
        activationParentIsSelf: false,
        selectorHint: cfg.valueSelector
      });

      blockObjectTemplate.kind = 'blockTemplateObject';
      this.addSlot(blockObjectTemplate, 'parent', this.getSlotValue(this.getSlotValue(this.lobby, 'traits'), 'block'), { isParent: true });

      return {
        kind: 'blockLiteralTemplate',
        label: cfg.label || 'blockLiteral',
        blockObjectTemplate,
        blockMethod,
        valueSelector: cfg.valueSelector

      const instance = this.cloneObjectShallow(blockLiteralTemplate.blockObjectTemplate, `${blockLiteralTemplate.label}::instance`);

      instance.blockLiteralTemplate = blockLiteralTemplate;

      const stack = [startObject];
      while (stack.length > 0) {

        if (visited.has(obj.id)) continue;

          holder: tmpl.blockObjectTemplate || null

        } else {
          receiver.slots[name].value = args[1];
        }
        return { handled: true, value: args[1] };
      }

      if (selectorName === 'clone' && args.length === 0 && receiver && receiver.kind && receiver.slots) {
        const cloned = this.cloneObjectShallow(receiver, `${receiver.label || 'object'}::clone`);
        if (receiver.kind === 'blockInstance') {
          cloned.kind = 'blockInstance';
          cloned.blockLiteralTemplate = receiver.blockLiteralTemplate;
          cloned._lexicalParent = receiver._lexicalParent;
        }
        return { handled: true, value: cloned };
      }

      if (this.isNumberObject(receiver)) {
        const a = receiver.jsValue;
        const unary = args.length === 0;
        const binary = args.length === 1;

          strObj.kind = 'string';
          strObj.jsValue = String(a);
          return { handled: true, value: strObj };

            case '-': return { handled: true, value: this.makeNumber(a - b) };
            case '*': return { handled: true, value: this.makeNumber(a * b) };
            case '/': return { handled: true, value: this.makeNumber(a / b) };
            default: break;
          }
        }
      }

      return { handled: false, value: null };
    }

      const activation = this.cloneObjectShallow(methodTemplate, `${methodTemplate.label || 'method'}::activation`);
      activation.kind = 'activation';
      activation.methodTemplate = methodTemplate;
      activation._messageReceiver = messageReceiver;
      activation._holder = meta && meta.holder ? meta.holder : null;
      activation._selectorName = meta && meta.selectorName ? meta.selectorName : null;

      const parentSlotName = methodTemplate.activationParentSlotName;
      if (!this.hasSlot(activation, parentSlotName)) {
        throw new VMError(`Activation parent slot '${parentSlotName}' missing on activation clone.`);
      }
      activation.slots[parentSlotName].value = methodTemplate.activationParentIsSelf
        ? messageReceiver
        : (messageReceiver && messageReceiver._lexicalParent ? messageReceiver._lexicalParent : null);

      // Bind arguments.
      if (args.length !== methodTemplate.argNames.length) {

          `Arity mismatch for ${this.describeValue(methodTemplate)}: expected ${methodTemplate.argNames.length}, got ${args.length}.`

      }
      for (let i = 0; i < methodTemplate.argNames.length; i++) {
        const argName = methodTemplate.argNames[i];
        activation.slots[argName].value = args[i];
      }

      const ctx = this.systemContext;
      const previousActivation = ctx.currentActivation;
      ctx.activationStack.push(previousActivation);
      ctx.currentActivation = activation;
      try {
        return this.executeActivation(activation);
      } finally {
        ctx.currentActivation = ctx.activationStack.pop();
      }
    }

    executeActivation(activation) {
      const instructions = activation.methodTemplate.instructions;
      const stack = [];

      const popValue = () => {
        if (stack.length === 0) throw new VMError('Stack underflow.');
        return stack.pop();
      };

      for (let pc = 0; pc < instructions.length; pc++) {
        const ins = instructions[pc];
        switch (ins.op) {
          case 'pushSelf':
            stack.push(activation);
            break;
          case 'dup':
            if (stack.length === 0) throw new VMError('Stack underflow on dup.');
            stack.push(stack[stack.length - 1]);
            break;
          case 'pop':
            popValue();
            break;
          case 'send': {
            const receiver = popValue();
            const args = [];
            for (let i = 0; i < ins.argc; i++) {
              args.unshift(popValue());
            }
            const result = this.send(receiver, ins.selector, args, { currentActivation: activation });
            stack.push(result);
            break;
          }
          case 'primitiveSend': {
            const receiver = popValue();
            const args = [];
            for (let i = 0; i < ins.argc; i++) {
              args.unshift(popValue());
            }
            const selectorName = ins.selector.name;
            const primitiveResult = this._tryPrimitiveSend(receiver, selectorName, args);
            if (!primitiveResult.handled) {
              throw new VMError(`Primitive '${selectorName}' not implemented for ${this.describeValue(receiver)}.`);
            }
            stack.push(primitiveResult.value);
            break;
          }
          case 'primitiveResend': {
            // Same as primitiveSend in this demo runtime.
            const receiver = popValue();
            const args = [];
            for (let i = 0; i < ins.argc; i++) {
              args.unshift(popValue());
            }
            const selectorName = ins.selector.name;
            const primitiveResult = this._tryPrimitiveSend(receiver, selectorName, args);
            if (!primitiveResult.handled) {
              throw new VMError(`Primitive '${selectorName}' not implemented for ${this.describeValue(receiver)}.`);
            }
            stack.push(primitiveResult.value);
            break;
          }
          case 'resend': {
            // Simple undirected resend: continue lookup from the lexical/message parent of current activation.
            const receiver = popValue();
            const args = [];
            for (let i = 0; i < ins.argc; i++) {
              args.unshift(popValue());
            }
            const parentSlotName = activation.methodTemplate.activationParentSlotName;
            const parentTarget = this.getSlotValue(activation, parentSlotName);
            if (!parentTarget) throw new VMError('Cannot resend without an activation parent target.');
            const selectorName = ins.selector.name;
            const found = this._lookupSlot(parentTarget, selectorName);
            if (!found) throw new VMError(`Resend '${selectorName}' not understood.`);
            const slotValue = this._resolveSlotValueForSend(found.slot, activation);
            if (slotValue && slotValue.kind === 'methodTemplate') {
              stack.push(this.invokeMethod(slotValue, receiver, args, { selectorName, holder: found.holder }));
            } else {
              stack.push(slotValue);
            }
            break;
          }
          case 'returnTop':
            return popValue();
          default:
            throw new VMError(`Unknown instruction op '${ins.op}'.`);
        }
      }

      return stack.length > 0 ? stack[stack.length - 1] : null;
    }

    numberValue(valueOrNumberObj) {
      return this.unwrapNumber(valueOrNumberObj);
    }

    // Convenience builders for examples.
    createDemoObject(label, parent) {
      const obj = this.newObject(label);
      if (parent) {
        this.addSlot(obj, 'parent', parent, { isParent: true });
      }
      return obj;
    }
  }

  function assert(condition, message) {
    if (!condition) throw new Error(message || 'Assertion failed');
  }

  function assertNumber(vm, value, expected, label) {
    const actual = vm.numberValue(value);
    if (actual !== expected) {
      throw new Error(`${label}: expected ${expected}, got ${actual}`);
    }
    return actual;
  }

  function buildExamples(vm) {
    const lobby = vm.lobby;
    const traits = vm.getSlotValue(lobby, 'traits');
    const globals = vm.getSlotValue(lobby, 'globals');
    const traitsObject = vm.getSlotValue(traits, 'object');

    // Example-specific namespaces under globals for visibility and to exercise lobby/globals wiring.
    const demos = vm.createDemoObject('globals.demos', traitsObject);
    vm.addSlot(globals, 'demos', demos);

    // ---------------------------------------------------------------------
    // Example 1: Standard method invocation + delegated lookup + activation.
    // ---------------------------------------------------------------------
    const mulTrait = vm.createDemoObject('traits.demoMul', traitsObject);
    vm.addSlot(demos, 'mulTrait', mulTrait);

    const mulMethod = vm.newMethodTemplate({
      label: 'mul:',
      selectorHint: 'mul:',
      argNames: ['arg'],
      bytecode: `
        pushSelf
        send arg
        pushSelf
        send a
        send * 1
        returnTop
